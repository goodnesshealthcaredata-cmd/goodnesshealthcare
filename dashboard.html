/* ===== LOAD OR CREATE SECTION PANE (PERSISTENT) ===== */
async function ensureSectionPane(sectionName, fileName) {
  if (sectionPanes.has(sectionName)) {
    return sectionPanes.get(sectionName);
  }
  
  // Create new pane
  const paneDiv = document.createElement('div');
  paneDiv.className = 'section-pane';
  paneDiv.setAttribute('data-section', sectionName);
  
  // Show loading indicator inside pane
  paneDiv.innerHTML = '<div class="loading-spinner"></div>';
  sectionsContainer.appendChild(paneDiv);
  
  // For Home Page or if file fetch fails, use demo content
  if (sectionName === "Home Page") {
    try {
      const cacheBuster = `?t=${Date.now()}`;
      const response = await fetch(fileName + cacheBuster);
      if (response.ok) {
        const html = await response.text();
        if (html && html.trim().length > 0) {
          const iframe = document.createElement('iframe');
          iframe.style.width = '100%';
          iframe.style.height = 'calc(100vh - 70px)';
          iframe.style.border = 'none';
          iframe.src = fileName + `?persist=${Date.now()}`;
          paneDiv.innerHTML = '';
          paneDiv.appendChild(iframe);
          sectionPanes.set(sectionName, { element: paneDiv, type: 'iframe', iframe: iframe });
          return sectionPanes.get(sectionName);
        }
      }
    } catch(e) {}
    paneDiv.innerHTML = generateDemoContent(sectionName);
    sectionPanes.set(sectionName, { element: paneDiv, type: 'html' });
    return sectionPanes.get(sectionName);
  }
  
  // For all other sections, try to load the HTML file via iframe
  try {
    const cacheBuster = `?t=${Date.now()}`;
    const response = await fetch(fileName + cacheBuster);
    if (response.ok) {
      const iframe = document.createElement('iframe');
      iframe.style.width = '100%';
      iframe.style.height = 'calc(100vh - 70px)';
      iframe.style.border = 'none';
      iframe.src = fileName + `?persist=${Date.now()}`;
      paneDiv.innerHTML = '';
      paneDiv.appendChild(iframe);
      sectionPanes.set(sectionName, { element: paneDiv, type: 'iframe', iframe: iframe });
    } else {
      paneDiv.innerHTML = generateDemoContent(sectionName);
      sectionPanes.set(sectionName, { element: paneDiv, type: 'html' });
    }
  } catch (error) {
    paneDiv.innerHTML = generateDemoContent(sectionName);
    sectionPanes.set(sectionName, { element: paneDiv, type: 'html' });
  }
  
  return sectionPanes.get(sectionName);
}

/* ===== SWITCH TO SECTION (Preserves state) ===== */
function switchToSection(sectionName) {
  if (!currentUserData || !currentUserData.sections.includes(sectionName)) {
    alert("Access Denied: You don't have permission to view this section.");
    return false;
  }
  
  // Hide all panes
  const allPanes = document.querySelectorAll('.section-pane');
  allPanes.forEach(pane => {
    pane.classList.remove('active-pane');
  });
  
  // Show target pane
  const paneInfo = sectionPanes.get(sectionName);
  if (paneInfo) {
    paneInfo.element.classList.add('active-pane');
    currentActiveSection = sectionName;
    
    // Update active button style
    const allButtons = document.querySelectorAll(".nav-item");
    allButtons.forEach(btn => {
      const btnSection = btn.getAttribute("data-section");
      if (btnSection === sectionName) btn.classList.add("active");
      else btn.classList.remove("active");
    });
    return true;
  }
  return false;
}

  const testReportsFile = "test_reports.html";
  
  if (currentUserData && currentUserData.sections.includes(testReportsSection)) {
    console.log("🔄 Preloading Test Reports section in background (not switching)...");
    // Create pane quietly without switching to it
    await ensureSectionPane(testReportsSection, testReportsFile);
    console.log("✅ Test Reports preloaded successfully in background");
  }
}

/* ===== INITIALIZE DASHBOARD - DEFAULT TO HOME PAGE ===== */
async function resetAndInitDashboard(userData) {
  currentUserData = userData;
  if (currentUserEmail) loginIdEl.innerText = currentUserEmail;
  userNameEl.innerText = userData.displayName;
  
  // Reset containers
  initSectionsContainer();
  sectionPanes.clear();
  sectionsContainer.innerHTML = '';
  
  // Build all section panes based on user permissions
  const sectionButtons = Array.from(navMenu.querySelectorAll(".nav-item"));
  let homePageSection = null;
  
  for (const btn of sectionButtons) {
    const section = btn.getAttribute("data-section");
    const file = btn.getAttribute("data-file");
    const hasAccess = currentUserData.sections.includes(section);
    
    if (hasAccess) {
      if (section === "Home Page") homePageSection = section;
      btn.style.display = "flex";
      // Create pane in background but not yet visible
      ensureSectionPane(section, file).catch(e => console.log(`Error creating pane for ${section}`, e));
      
      // Re-attach click event
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      newBtn.addEventListener("click", async (e) => {
        e.preventDefault();
        e.stopPropagation();
        await switchToSection(section);
        if (window.innerWidth <= 768) closeSidebarMobile();
      });
    } else {
      btn.style.display = "none";
    }
  }
  
  // Preload Test Reports in background (silent, doesn't switch view)
  setTimeout(async () => {
    await preloadTestReportsInBackground();
  }, 500);
  
  // AFTER all panes are created, switch to Home Page (default)
  setTimeout(async () => {
    if (homePageSection && currentUserData.sections.includes(homePageSection)) {
      await switchToSection(homePageSection);
    } else {
      // Fallback to first available section if Home Page not accessible
      const firstAvailable = currentUserData.sections[0];
      if (firstAvailable) await switchToSection(firstAvailable);
    }
  }, 800);
}

/* ===== MOBILE SIDEBAR ===== */
function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  }
}
function openSidebarMobile() {
  if (window.innerWidth <= 768) {
    sidebar.classList.add("open");
    overlay.classList.add("active");
    document.body.style.overflow = "hidden";
  }
}

if (menuToggle) {
  const newToggle = menuToggle.cloneNode(true);
  menuToggle.parentNode.replaceChild(newToggle, menuToggle);
  newToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (sidebar.classList.contains("open")) closeSidebarMobile();
    else openSidebarMobile();
  });
}
if (overlay) {
  overlay.addEventListener("click", closeSidebarMobile);
}
window.addEventListener("resize", () => {
  if (window.innerWidth > 768) {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  }
});

/* ===== AUTHENTICATION ===== */
onAuthStateChanged(auth, (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }
  const userData = USERS[user.email];
  if (!userData) {
    alert("Unauthorized Access");
    signOut(auth).then(() => { window.location.href = "login.html"; });
    return;
  }
  currentUserEmail = user.email;
  resetAndInitDashboard(userData);
});

/* ===== LOGOUT ===== */
if (logoutBtn) {
  const freshLogout = logoutBtn.cloneNode(true);
  logoutBtn.parentNode.replaceChild(freshLogout, logoutBtn);
  freshLogout.addEventListener("click", async (e) => {
    e.preventDefault();
    await signOut(auth);
    window.location.href = "login.html";
  });
}

window.addEventListener('pageshow', (event) => {
  if (event.persisted) window.location.reload();
});

console.log("✅ Dashboard with PERSISTENT SECTIONS | Default: Home Page | Test Reports preloaded in background silently.");
</script>
</body>
</html>
