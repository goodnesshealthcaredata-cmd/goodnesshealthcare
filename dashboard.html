<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Goodness Healthcare | Dashboard</title>

<style>
/* ===== PREMIUM TEAL THEME STYLES ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: #EBF4F6;
  height: 100vh;
  overflow: hidden;
  color: #1a2c3e;
}

.dashboard {
  display: flex;
  height: 100vh;
  width: 100%;
}

/* SIDEBAR - Premium Teal */
.sidebar {
  width: 280px;
  background: linear-gradient(180deg, #09637E 0%, #055060 100%);
  color: white;
  display: flex;
  flex-direction: column;
  transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
  box-shadow: 8px 0 25px rgba(7, 50, 65, 0.12);
  z-index: 20;
  overflow-y: auto;
  flex-shrink: 0;
}

/* Mobile sidebar positioning */
@media (max-width: 768px) {
  .sidebar {
    position: fixed;
    top: 0;
    left: 0;
    height: 100%;
    transform: translateX(-100%);
    transition: transform 0.3s ease-in-out;
    z-index: 1000;
  }
  
  .sidebar.open {
    transform: translateX(0);
  }
}

@media (min-width: 769px) {
  .sidebar {
    position: relative;
    transform: translateX(0) !important;
  }
}

.sidebar::-webkit-scrollbar {
  width: 5px;
}
.sidebar::-webkit-scrollbar-track {
  background: #09637E;
}
.sidebar::-webkit-scrollbar-thumb {
  background: #7AB2B2;
  border-radius: 10px;
}

/* User Profile Section */
.user-profile-section {
  padding: 24px 20px;
  border-bottom: 1px solid rgba(122, 178, 178, 0.35);
  margin-bottom: 20px;
  background: rgba(7, 80, 96, 0.3);
}

.user-profile-section div {
  margin-bottom: 10px;
  font-size: 0.85rem;
  word-break: break-word;
}

.user-profile-section b {
  color: white;
  font-weight: 600;
  margin-left: 8px;
}

#logoutBtnSidebar {
  margin-top: 16px;
  width: 100%;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(122, 178, 178, 0.6);
  color: white;
  padding: 10px 12px;
  border-radius: 50px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.25s ease;
  font-size: 0.9rem;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: inherit;
}

#logoutBtnSidebar:hover {
  background: #088395;
  border-color: #EBF4F6;
  transform: translateY(-1px);
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
}

/* Navigation Menu */
.nav-menu {
  flex: 1;
  padding: 0 14px 20px 14px;
}

.nav-item {
  width: 100%;
  text-align: left;
  background: transparent;
  border: none;
  color: #E9F3F5;
  padding: 12px 18px;
  margin-bottom: 8px;
  border-radius: 16px;
  font-size: 0.95rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  display: flex;
  align-items: center;
  gap: 12px;
  font-family: inherit;
}

.nav-item:hover {
  background: rgba(8, 131, 149, 0.5);
  color: white;
  transform: translateX(4px);
}

.nav-item.active {
  background: #088395;
  color: white;
  box-shadow: 0 8px 16px -6px rgba(7, 50, 65, 0.35);
  font-weight: 600;
}

/* MAIN CONTENT AREA */
.main-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background: #EBF4F6;
}

/* TOPBAR with Logo */
.topbar {
  background: white;
  padding: 0 28px;
  height: 70px;
  display: flex;
  align-items: center;
  gap: 16px;
  box-shadow: 0 4px 20px rgba(7, 50, 65, 0.05);
  border-bottom: 1px solid rgba(122, 178, 178, 0.3);
  flex-shrink: 0;
}

#menuToggleBtn {
  background: #EBF4F6;
  border: none;
  font-size: 24px;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: 12px;
  color: #09637E;
  transition: all 0.2s;
  display: none;
}

#menuToggleBtn:hover {
  background: #d9e9ec;
}

.topbar-logo {
  width: 40px;
  height: 40px;
  object-fit: contain;
  border-radius: 10px;
  flex-shrink: 0;
}

.topbar h3 {
  font-size: 1.35rem;
  font-weight: 700;
  background: linear-gradient(135deg, #09637E, #088395);
  background-clip: text;
  -webkit-background-clip: text;
  color: transparent;
  letter-spacing: -0.2px;
}

/* CONTENT AREA */
.content {
  flex: 1;
  padding: 10;
  overflow-y: auto;
  background: #EBF4F6;
}

.dynamic-view {
  background: white;
  border-radius: 0;
  min-height: 100%;
  border: none;
  overflow: auto;
  position: relative;
}

/* Home Page Welcome Styling */
.home-welcome {
  padding: 40px 30px;
  text-align: center;
  background: linear-gradient(135deg, #ffffff 0%, #f0f7f9 100%);
  min-height: 100%;
}

.home-welcome h1 {
  color: #09637E;
  font-size: 2.2rem;
  margin-bottom: 20px;
}

.home-welcome .welcome-icon {
  font-size: 64px;
  margin-bottom: 20px;
}

.home-welcome p {
  color: #4a6f73;
  font-size: 1.1rem;
  max-width: 600px;
  margin: 0 auto 30px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  max-width: 800px;
  margin: 40px auto 0;
}

.stat-card {
  background: #EBF4F6;
  border-radius: 20px;
  padding: 25px;
  text-align: center;
  transition: transform 0.2s;
}

.stat-card:hover {
  transform: translateY(-5px);
}

.stat-card .stat-number {
  font-size: 2rem;
  font-weight: 700;
  color: #088395;
}

.stat-card .stat-label {
  color: #09637E;
  margin-top: 8px;
}

/* Loading Spinner */
.loading-spinner {
  border: 4px solid #EBF4F6;
  border-top: 4px solid #088395;
  border-radius: 50%;
  width: 48px;
  height: 48px;
  animation: spin 0.8s linear infinite;
  margin: 60px auto;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}

.error-message {
  padding: 50px 30px;
  text-align: center;
}

.error-message h3 {
  color: #b91c1c;
  margin-bottom: 16px;
}

.instruction-box {
  background: #EBF4F6;
  border-radius: 16px;
  padding: 20px;
  margin-top: 20px;
  text-align: left;
  max-width: 500px;
  margin-left: auto;
  margin-right: auto;
}

/* MOBILE RESPONSIVE */
@media (max-width: 768px) {
  .topbar {
    padding: 0 16px;
  }
  
  .content {
    padding: 0;
  }
  
  #menuToggleBtn {
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .topbar h3 {
    font-size: 1rem;
  }
  
  .topbar-logo {
    width: 32px;
    height: 32px;
  }
  
  .home-welcome h1 {
    font-size: 1.5rem;
  }
  
  .stats-grid {
    grid-template-columns: 1fr;
  }
}

/* Mobile Overlay */
.mobile-overlay {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(7, 50, 65, 0.5);
  backdrop-filter: blur(2px);
  z-index: 999;
}

.mobile-overlay.active {
  display: block;
}
</style>
</head>

<body>

<div class="dashboard">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="user-profile-section">
      <div>🔐 <b id="sidebarLoginId">—</b></div>
      <div>👤 <b id="sidebarUserName">—</b></div>
      <button id="logoutBtnSidebar">🚪 Logout</button>
    </div>

    <div class="nav-menu" id="navMenu">
      <button class="nav-item" data-section="Home Page" data-file="home.html">🏠 Home Page</button>
      <button class="nav-item" data-section="Add Entry" data-file="add_entry.html">📋 Add Entry</button>
      <button class="nav-item" data-section="Visit Schedule" data-file="visit_schedule.html">📅 Visit Schedule</button>
      <button class="nav-item" data-section="Price Comparison" data-file="price_comparison.html">💰 Price Comparison</button>
      <button class="nav-item" data-section="Test Reports" data-file="test_reports.html">🧪 Test Reports</button>
      <button class="nav-item" data-section="Pending Payment" data-file="pending_payment.html">💳 Pending Payment</button>
      <button class="nav-item" data-section="Data Sheets" data-file="data_sheets.html">📊 Data Sheets</button>
      <button class="nav-item" data-section="Data Analysis" data-file="data_analysis.html">📈 Data Analysis</button>
    </div>
  </div>

  <!-- MAIN CONTENT AREA -->
  <div class="main-area">
    <div class="topbar">
      <button id="menuToggleBtn">☰</button>
      <img id="topbarLogo" class="topbar-logo" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%2309637E'/%3E%3Ctext x='50' y='67' font-size='40' text-anchor='middle' fill='white' font-weight='bold'%3EGH%3C/text%3E%3C/svg%3E" alt="Logo">
      <h3>✨ Goodness Healthcare</h3>
    </div>

    <div class="content">
      <div id="dynamicView" class="dynamic-view">
        <div class="loading-spinner"></div>
      </div>
    </div>
  </div>
</div>

<div class="mobile-overlay" id="mobileOverlay"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } 
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

/* ===== FIREBASE CONFIGURATION ===== */
const firebaseConfig = {
  apiKey: "AIzaSyBZn1isgreU_1YcVl7dQ5haa28gZ-vCrM4",
  authDomain: "goodnessdata-41725.firebaseapp.com",
  projectId: "goodnessdata-41725"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* ===== USERS DATABASE (ROLE SYSTEM) ===== */
const USERS = {
  "kaushalachrekar@gmail.com": {
    displayName: "Kaushal",
    sections: ["Home Page", "Add Entry", "Visit Schedule", "Price Comparison", "Test Reports", "Pending Payment", "Data Sheets", "Data Analysis"],
    canEdit: true
  },
  "staff@gmail.com": {
    displayName: "Staff",
    sections: ["Home Page", "Add Entry", "Visit Schedule", "Pending Payment"],
    canEdit: false
  }
};

/* ===== DOM ELEMENTS ===== */
const sidebar = document.getElementById("sidebar");
const dynamicView = document.getElementById("dynamicView");
const loginIdEl = document.getElementById("sidebarLoginId");
const userNameEl = document.getElementById("sidebarUserName");
const navMenu = document.getElementById("navMenu");
const logoutBtn = document.getElementById("logoutBtnSidebar");
const menuToggle = document.getElementById("menuToggleBtn");
const overlay = document.getElementById("mobileOverlay");
const topbarLogo = document.getElementById("topbarLogo");

let currentUserData = null;
let currentUserEmail = null;
let currentSection = null;
let currentIframe = null;

/* ===== FIX LOGO ===== */
if (topbarLogo) {
  const logoUrl = "https://lh3.googleusercontent.com/d/1viGx6qVjAgEowFtmOJziX-NdhYArt4BM";
  const img = new Image();
  img.onload = function() {
    topbarLogo.src = logoUrl;
  };
  img.onerror = function() {
    console.log("Using fallback logo");
  };
  img.src = logoUrl;
}

/* ===== COMPLETE CLEANUP FUNCTION ===== */
function completeCleanup() {
  // Destroy iframe if exists
  if (currentIframe) {
    currentIframe.src = 'about:blank';
    currentIframe.remove();
    currentIframe = null;
  }
  
  // Clear the dynamic view completely
  dynamicView.innerHTML = '';
  
  // Remove any dynamically added script tags that might have been added to body
  const allScripts = document.querySelectorAll('script');
  allScripts.forEach(script => {
    if (script.id && script.id.startsWith('dynamic-script-')) {
      script.remove();
    }
  });
  
  // Remove any dynamically added style tags
  const allStyles = document.querySelectorAll('style');
  allStyles.forEach(style => {
    if (style.id && style.id.startsWith('dynamic-style-')) {
      style.remove();
    }
  });
}

/* ===== LOAD CONTENT USING IFRAME (Most reliable method) ===== */
function loadContentWithIframe(fileName, sectionName) {
  // Complete cleanup before loading new content
  completeCleanup();
  
  // Create new iframe
  const iframe = document.createElement('iframe');
  iframe.style.width = '100%';
  iframe.style.height = 'calc(100vh - 70px)';
  iframe.style.border = 'none';
  iframe.style.backgroundColor = 'white';
  iframe.style.display = 'block';
  
  // Add cache buster to prevent caching issues
  const cacheBuster = `?t=${Date.now()}`;
  iframe.src = fileName + cacheBuster;
  
  // Store reference for cleanup
  currentIframe = iframe;
  
  // Add to DOM
  dynamicView.appendChild(iframe);
  
  console.log(`✅ Loaded ${sectionName} via iframe: ${fileName}`);
}

/* ===== HOME PAGE CONTENT ===== */
function showHomePage() {
  completeCleanup();
  
  const homeHTML = `
    <div class="home-welcome">
      <div class="welcome-icon">🏥</div>
      <h1>Welcome to Goodness Healthcare</h1>
      <p>Your comprehensive healthcare management dashboard. Access patient records, visit schedules, financial data, and analytics all in one place.</p>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-number">📋</div>
          <div class="stat-label">Patient Records</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">📅</div>
          <div class="stat-label">Appointments</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">💰</div>
          <div class="stat-label">Revenue Tracked</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">📊</div>
          <div class="stat-label">Data Insights</div>
        </div>
      </div>
    </div>
  `;
  dynamicView.innerHTML = homeHTML;
}

/* ===== LOAD HTML FILE WITH PROPER CLEANUP ===== */
async function loadHtmlFile(fileName, sectionName) {
  // Special handling for Home Page
  if (sectionName === "Home Page") {
    try {
      const cacheBuster = `?t=${Date.now()}`;
      const response = await fetch(fileName + cacheBuster);
      if (response.ok) {
        const htmlContent = await response.text();
        if (htmlContent && htmlContent.trim().length > 0) {
          // Use iframe method for consistency
          loadContentWithIframe(fileName, sectionName);
          return;
        }
      }
    } catch (e) {
      console.log("Home page file not found, showing default home page");
    }
    showHomePage();
    return;
  }
  
  if (!fileName) {
    showDemoContent(sectionName);
    return;
  }
  
  // Use iframe method which is most reliable for script execution
  loadContentWithIframe(fileName, sectionName);
}

/* ===== SHOW DEMO CONTENT FOR MISSING FILES ===== */
function showDemoContent(sectionName) {
  completeCleanup();
  
  const demoContent = `
    <div class="error-message">
      <div style="font-size: 48px; margin-bottom: 20px;">📄</div>
      <h3>${sectionName}</h3>
      <p style="color: #5a7c82; margin-bottom: 16px;">
        Content for ${sectionName} will appear here.
      </p>
      <div class="instruction-box">
        <h4 style="color: #09637E; margin-bottom: 12px;">📁 Setup Instructions:</h4>
        <p>Create <strong>${getFileNameForSection(sectionName)}</strong> in the same folder as this dashboard.</p>
        <p style="margin-top: 10px;">Add your HTML content to that file and it will load automatically.</p>
      </div>
    </div>
  `;
  dynamicView.innerHTML = demoContent;
}

function getFileNameForSection(sectionName) {
  const fileMap = {
    "Home Page": "home.html",
    "Add Entry": "add_entry.html",
    "Visit Schedule": "visit_schedule.html",
    "Price Comparison": "price_comparison.html",
    "Test Reports": "test_reports.html",
    "Pending Payment": "pending_payment.html",
    "Data Sheets": "data_sheets.html",
    "Data Analysis": "data_analysis.html"
  };
  return fileMap[sectionName] || `${sectionName.toLowerCase().replace(/ /g, '_')}.html`;
}

/* ===== NAVIGATION FUNCTION - COMPLETELY RELOADS ON EACH CLICK ===== */
function navigateToSection(section, fileName) {
  // Security check
  if (!currentUserData || !currentUserData.sections.includes(section)) {
    alert("You don't have permission to access this section.");
    return;
  }
  
  // Update current section
  currentSection = section;
  
  // Update active state on buttons
  const allButtons = document.querySelectorAll(".nav-item");
  allButtons.forEach(btn => {
    const btnSection = btn.getAttribute("data-section");
    if (btnSection === section) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });
  
  // Load the content fresh
  loadHtmlFile(fileName, section);
}

/* ===== RESET AND REINITIALIZE DASHBOARD ===== */
function resetAndInitDashboard(userData) {
  // Reset current section to force fresh load
  currentSection = null;
  
  // Complete cleanup
  completeCleanup();
  
  // Show loading state
  dynamicView.innerHTML = '<div class="loading-spinner"></div>';
  
  // Reset active states
  const allButtons = document.querySelectorAll(".nav-item");
  allButtons.forEach(btn => {
    btn.classList.remove("active");
  });
  
  // Update user data
  currentUserData = userData;
  
  if (currentUserEmail) {
    loginIdEl.innerText = currentUserEmail;
  }
  userNameEl.innerText = userData.displayName;
  
  // Setup sidebar with fresh event listeners
  setupSidebarFresh();
}

/* ===== FRESH SETUP OF SIDEBAR ===== */
function setupSidebarFresh() {
  const buttons = navMenu.querySelectorAll(".nav-item");
  let firstVisibleSection = null;
  let firstVisibleFile = null;

  buttons.forEach(btn => {
    const section = btn.getAttribute("data-section");
    const file = btn.getAttribute("data-file");
    
    if (currentUserData && currentUserData.sections.includes(section)) {
      btn.style.display = "flex";
      if (!firstVisibleSection) {
        firstVisibleSection = section;
        firstVisibleFile = file;
      }
      // Remove old listeners by cloning
      const newBtn = btn.cloneNode(true);
      btn.parentNode.replaceChild(newBtn, btn);
      newBtn.addEventListener("click", (e) => {
        e.preventDefault();
        e.stopPropagation();
        const sectionName = newBtn.getAttribute("data-section");
        const fileName = newBtn.getAttribute("data-file");
        navigateToSection(sectionName, fileName);
        if (window.innerWidth <= 768) {
          closeSidebarMobile();
        }
      });
    } else {
      btn.style.display = "none";
    }
  });

  // Navigate to first available section (Home Page by default)
  if (firstVisibleSection && firstVisibleFile) {
    setTimeout(() => {
      navigateToSection(firstVisibleSection, firstVisibleFile);
    }, 100);
  }
}

/* ===== MOBILE SIDEBAR FUNCTIONS ===== */
function closeSidebarMobile() {
  if (window.innerWidth <= 768) {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  }
}

function openSidebarMobile() {
  if (window.innerWidth <= 768) {
    sidebar.classList.add("open");
    overlay.classList.add("active");
    document.body.style.overflow = "hidden";
  }
}

/* ===== EVENT LISTENERS ===== */
if (menuToggle) {
  const newMenuToggle = menuToggle.cloneNode(true);
  menuToggle.parentNode.replaceChild(newMenuToggle, menuToggle);
  
  newMenuToggle.addEventListener("click", (e) => {
    e.stopPropagation();
    if (sidebar.classList.contains("open")) {
      closeSidebarMobile();
    } else {
      openSidebarMobile();
    }
  });
}

if (overlay) {
  overlay.addEventListener("click", () => {
    closeSidebarMobile();
  });
}

window.addEventListener("resize", () => {
  if (window.innerWidth > 768) {
    sidebar.classList.remove("open");
    overlay.classList.remove("active");
    document.body.style.overflow = "";
  }
});

/* ===== AUTHENTICATION ===== */
onAuthStateChanged(auth, (user) => {
  console.log("Auth state changed:", user ? `Logged in: ${user.email}` : "No user");
  
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  const userData = USERS[user.email];
  
  if (!userData) {
    alert("Access Denied: Unauthorized User");
    signOut(auth).then(() => {
      window.location.href = "login.html";
    });
    return;
  }

  currentUserEmail = user.email;
  resetAndInitDashboard(userData);
});

/* ===== LOGOUT ===== */
if (logoutBtn) {
  const newLogoutBtn = logoutBtn.cloneNode(true);
  logoutBtn.parentNode.replaceChild(newLogoutBtn, logoutBtn);
  
  newLogoutBtn.addEventListener("click", async (e) => {
    e.preventDefault();
    e.stopPropagation();
    
    // Clean up before logout
    completeCleanup();
    currentUserData = null;
    currentUserEmail = null;
    currentSection = null;
    currentIframe = null;
    dynamicView.innerHTML = '<div class="loading-spinner"></div>';
    
    try {
      await signOut(auth);
      window.location.href = "login.html";
    } catch (error) {
      console.error("Logout error:", error);
      window.location.href = "login.html";
    }
  });
}

window.logout = function() {
  completeCleanup();
  currentUserData = null;
  currentUserEmail = null;
  currentSection = null;
  currentIframe = null;
  signOut(auth)
    .then(() => {
      window.location.href = "login.html";
    })
    .catch(() => {
      window.location.href = "login.html";
    });
};

// Remove conflicting old elements
const oldSections = ['dashboard', 'patients', 'reports', 'settings'];
oldSections.forEach(id => {
  const el = document.getElementById(id);
  if (el) el.remove();
});

// Handle page cache
window.addEventListener('pageshow', function(event) {
  if (event.persisted) {
    window.location.reload();
  }
});

console.log("✅ Dashboard FULLY FIXED - Each section now loads fresh with complete cleanup");
console.log("✅ Using iframe method for reliable script execution every time");

</script>

</body>
</html>
