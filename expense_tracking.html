<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>MediTrack Expense | Medical Expense Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --navy-deep: #0F3D5E;
            --navy-dark: #0a2e48;
            --teal-bright: #1ECAD3;
            --teal-hover: #15b8c0;
            --teal-glow: rgba(30, 202, 211, 0.25);
            --gray-bg: #F5F7FA;
            --gray-border: #E5EAF0;
            --gray-card: #FFFFFF;
            --text-primary: #1A2C3E;
            --text-secondary: #5B6E8C;
            --text-muted: #8A99B0;
            --success: #10B981;
            --warning: #F59E0B;
            --error: #EF4444;
            --shadow-sm: 0 4px 12px rgba(0, 0, 0, 0.03), 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.02);
            --shadow-lg: 0 20px 32px -12px rgba(0, 0, 0, 0.1);
            --radius-card: 20px;
            --radius-element: 14px;
            --radius-sm: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--gray-bg);
            color: var(--text-primary);
            line-height: 1.5;
        }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Rubik', sans-serif;
            font-weight: 600;
        }

        .app-wrapper {
            min-height: 100vh;
            background: linear-gradient(145deg, #f0f4f9 0%, #eef2f6 100%);
        }

        .dashboard-container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 15px 15px;
        }

        .app-header {
            margin-bottom: 32px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--teal-bright), #0FA9B3);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 18px rgba(30, 202, 211, 0.25);
        }

        .logo-icon i {
            font-size: 24px;
            color: white;
        }

        .logo-text h1 {
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--navy-deep);
            letter-spacing: -0.3px;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .tabs-modern {
            display: flex;
            gap: 12px;
            background: white;
            padding: 6px;
            border-radius: 60px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 32px;
        }

        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 24px;
            font-family: 'Rubik', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            border-radius: 50px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .tab-btn i {
            font-size: 1.1rem;
            transition: transform 0.2s;
        }

        .tab-btn.active {
            background: var(--navy-deep);
            color: white;
            box-shadow: 0 4px 12px rgba(15, 61, 94, 0.2);
        }

        .tab-btn.active i {
            color: var(--teal-bright);
        }

        .tab-btn:hover:not(.active) {
            background: var(--gray-bg);
            color: var(--navy-deep);
        }

        .card-premium {
            background: var(--gray-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-md);
            padding: 28px 32px;
            margin-bottom: 28px;
            border: 1px solid rgba(0,0,0,0.02);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        .card-premium:hover {
            box-shadow: var(--shadow-lg);
        }

        .filter-row {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: flex-end;
        }

        .filter-group {
            flex: 1;
            min-width: 180px;
        }

        .filter-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .filter-group input, .filter-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid var(--gray-border);
            border-radius: var(--radius-element);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            transition: all 0.2s;
            background: white;
        }

        .filter-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .filter-group input:focus, .filter-group textarea:focus {
            outline: none;
            border-color: var(--teal-bright);
            box-shadow: 0 0 0 3px var(--teal-glow);
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 24px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .btn-primary {
            background: linear-gradient(105deg, var(--teal-bright), #17b1b9);
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Rubik', sans-serif;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.25s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 6px rgba(30, 202, 211, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(105deg, var(--teal-hover), #0e9ea6);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(30, 202, 211, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid var(--gray-border);
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: var(--gray-bg);
            border-color: var(--teal-bright);
            color: var(--teal-bright);
        }

        .btn-danger {
            background: transparent;
            border: 1.5px solid var(--error);
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: var(--error);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-danger:hover {
            background: var(--error);
            color: white;
            border-color: var(--error);
        }

        .total-card {
            background: linear-gradient(135deg, var(--navy-deep) 0%, #124e72 100%);
            border-radius: var(--radius-card);
            padding: 20px 28px;
            margin-bottom: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            color: white;
            box-shadow: var(--shadow-md);
        }

        .total-label {
            font-size: 1rem;
            font-weight: 500;
            letter-spacing: 0.3px;
            opacity: 0.9;
        }

        .total-amount {
            font-family: 'Rubik', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--teal-bright);
        }

        .table-responsive {
            overflow-x: auto;
            border-radius: var(--radius-card);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th {
            text-align: left;
            padding: 18px 16px;
            background: var(--gray-bg);
            font-family: 'Rubik', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--navy-deep);
            border-bottom: 1px solid var(--gray-border);
        }

        .data-table td {
            padding: 16px;
            border-bottom: 1px solid var(--gray-border);
            color: var(--text-primary);
            font-size: 0.9rem;
            vertical-align: top;
        }

        .data-table tr:hover td {
            background-color: rgba(30, 202, 211, 0.04);
        }

        .description-cell {
            max-width: 250px;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .edit-action-btn, .delete-action-btn {
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .edit-action-btn {
            background: rgba(30, 202, 211, 0.12);
            color: var(--teal-bright);
        }

        .edit-action-btn:hover {
            background: var(--teal-bright);
            color: white;
            transform: scale(1.02);
        }

        .delete-action-btn {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .delete-action-btn:hover {
            background: var(--error);
            color: white;
        }

        .save-btn, .cancel-btn {
            padding: 6px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            margin: 0 4px;
        }

        .save-btn {
            background: var(--teal-bright);
            color: white;
            border: none;
        }

        .save-btn:hover {
            background: var(--teal-hover);
        }

        .cancel-btn {
            background: transparent;
            border: 1px solid var(--gray-border);
            color: var(--text-secondary);
        }

        .cancel-btn:hover {
            background: var(--gray-bg);
            border-color: var(--error);
            color: var(--error);
        }

        .pagination-area {
            margin-top: 32px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }

        .page-item {
            background: white;
            border: 1px solid var(--gray-border);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .page-item.active-page {
            background: var(--navy-deep);
            color: white;
            border-color: var(--navy-deep);
        }

        .page-item:hover:not(.active-page) {
            background: var(--gray-bg);
            border-color: var(--teal-bright);
        }

        /* Column Filter */
        .column-filter {
            position: relative;
            display: inline-block;
            margin-left: 8px;
            cursor: pointer;
            color: var(--text-muted);
        }
        .column-filter i {
            font-size: 0.8rem;
        }
        .filter-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            background: white;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            min-width: 200px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 200;
            box-shadow: var(--shadow-lg);
            display: none;
            margin-top: 8px;
        }
        .filter-dropdown.show {
            display: block;
        }
        .filter-header {
            padding: 12px;
            border-bottom: 1px solid var(--gray-border);
            font-weight: 600;
            background: var(--gray-bg);
        }
        .filter-search {
            padding: 8px 12px;
            width: 100%;
            border: none;
            border-bottom: 1px solid var(--gray-border);
        }
        .filter-option {
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .filter-option:hover {
            background: var(--gray-bg);
        }
        .filter-option input {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }
        .filter-actions {
            padding: 10px;
            border-top: 1px solid var(--gray-border);
            display: flex;
            gap: 8px;
            justify-content: space-between;
        }
        .filter-actions button {
            font-size: 0.75rem;
            padding: 4px 10px;
        }
        .dropdown-container {
            position: relative;
        }
        .dropdown-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid var(--gray-border);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            box-shadow: var(--shadow-md);
        }
        .dropdown-list.show {
            display: block;
        }
        .dropdown-item {
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .dropdown-item:hover {
            background: var(--gray-bg);
            color: var(--teal-bright);
        }
        .message {
            padding: 14px 20px;
            border-radius: 60px;
            margin: 20px 0 0;
            font-weight: 500;
            animation: fadeInUp 0.25s ease;
        }
        .success-msg {
            background: #e0f9ed;
            color: #0f6e3f;
            border-left: 4px solid var(--success);
        }
        .error-msg {
            background: #feeceb;
            color: #b91c1c;
            border-left: 4px solid var(--error);
        }
        .inline-edit-input, .inline-edit-textarea {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--teal-bright);
            border-radius: 12px;
            font-family: 'DM Sans', monospace;
            font-size: 0.85rem;
        }
        .inline-edit-textarea {
            min-height: 60px;
            resize: vertical;
        }
        .spinner-small {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.5s linear infinite;
            margin-right: 6px;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px);}
            to { opacity: 1; transform: translateY(0);}
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            .dashboard-container { padding: 16px; }
            .card-premium { padding: 20px; }
            .total-amount { font-size: 1.8rem; }
            .tab-btn { padding: 10px 16px; font-size: 0.85rem; }
            .data-table th, .data-table td { padding: 12px; }
            .action-buttons { flex-direction: column; gap: 6px; }
        }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; animation: fadeInUp 0.3s ease; }
    </style>
</head>
<body>
<div class="app-wrapper">
    <div class="dashboard-container">
        <div class="app-header">
            <div class="logo-area">
                <div class="logo-icon"><i class="fas fa-clinic-medical"></i></div>
                <div class="logo-text"><h1>MediTrack Expense</h1></div>
            </div>
        </div>
        <div class="tabs-modern">
            <button class="tab-btn active" data-tab="list"><i class="fas fa-chart-line"></i> Expense List</button>
            <button class="tab-btn" data-tab="add"><i class="fas fa-plus-circle"></i> Add New Expense</button>
        </div>

        <!-- Expense List Panel -->
        <div id="listPanel" class="tab-pane active-pane">
            <div class="card-premium">
                <div class="filter-row">
                    <div class="filter-group"><label><i class="fas fa-search"></i> Global Search</label><input type="text" id="searchInput" placeholder="Search reason or description..."></div>
                    <div class="filter-group"><label><i class="far fa-calendar-alt"></i> Start Date</label><input type="date" id="startDateFilter"></div>
                    <div class="filter-group"><label><i class="far fa-calendar-alt"></i> End Date</label><input type="date" id="endDateFilter"></div>
                    <div class="filter-group"><button id="clearFiltersBtn" class="btn-secondary"><i class="fas fa-eraser"></i> Clear</button></div>
                </div>
            </div>
            <div class="total-card">
                <span class="total-label"><i class="fas fa-rupee-sign"></i> Total Expenses </span>
                <span class="total-amount" id="totalAmount">₹0</span>
            </div>
            <div class="card-premium" style="padding: 0; overflow: hidden;">
                <div class="table-responsive">
                    <table class="data-table">
                        <thead>
                            <tr><th>Date</th><th id="reasonColumnHeader">Expense Reason <span class="column-filter" id="reasonFilterIcon"><i class="fas fa-filter"></i></span><div id="reasonFilterDropdown" class="filter-dropdown"></div></th><th>Description</th><th>Amount (₹)</th><th>Action</th></tr>
                        </thead>
                        <tbody id="tableBody"><tr><td colspan="5" style="text-align:center; padding: 48px;"><i class="fas fa-spinner fa-pulse"></i> Loading...</td></tr></tbody>
                    </table>
                </div>
                <div id="paginationControls" class="pagination-area"></div>
                <div id="listMessage"></div>
            </div>
        </div>

        <!-- Add Expense Panel -->
        <div id="addPanel" class="tab-pane">
            <div class="card-premium">
                <h3 style="margin-bottom: 28px;"><i class="fas fa-file-invoice-dollar" style="color: var(--teal-bright); margin-right: 12px;"></i> Register New Expense</h3>
                <div class="form-grid">
                    <div class="filter-group"><label>📆 Date *</label><input type="date" id="expenseDate"></div>
                    <div class="filter-group"><label>🏷️ Expense Reason *</label><div class="dropdown-container"><input type="text" id="expenseReason" class="dropdown-input" placeholder="Select or type reason"><div id="reasonDropdown" class="dropdown-list"></div></div></div>
                    <div class="filter-group"><label>💰 Amount (₹) *</label><input type="number" id="expenseAmount" step="1" placeholder="0"></div>
                    <div class="full-width"><label><i class="fas fa-align-left"></i> Description</label><textarea id="expenseDescription" rows="3" placeholder="Additional details..."></textarea></div>
                </div>
                <div style="display: flex; gap: 16px; flex-wrap: wrap;"><button id="submitExpenseBtn" class="btn-primary"><i class="fas fa-save"></i> Save Expense</button><button id="resetFormBtn" class="btn-secondary"><i class="fas fa-redo-alt"></i> Reset</button></div>
                <div id="formMessage"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw-QEMhN3VXfZp-Fo92sftX1Z2_XhCww4Ag_35KwgTSOPpWaPEeaLwUIBDH65FHD_3crg/exec";
    const PREDEFINED_REASONS = ["Conveyance Charges","Food & Beverage Cost","Stationary Cost","Tonner Refilling Cost","Goodwill Charges","Visit Charges","Soni Salary","Sumit Salary","Prerana Salary","Rent+","Farma Stock Cost","Other Expense"];
    
    let allExpenses = [], filteredExpenses = [], currentPage = 1;
    let reasonFilterSet = new Set(); // Store selected reasons for filter
    const rowsPerPage = 20;
    
    function formatINR(amount) { return "₹" + Math.round(amount).toLocaleString('en-IN'); }
    function formatDateDDMM(dateStr) {
        if(!dateStr) return '';
        if(dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) { const [y,m,d]=dateStr.split('-'); return `${d}-${m}-${y}`; }
        if(dateStr.match(/^\d{2}-\d{2}-\d{4}$/)) return dateStr;
        try{ let d=new Date(dateStr); if(!isNaN(d)) return `${String(d.getDate()).padStart(2,'0')}-${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`; } catch(e){}
        return dateStr;
    }
    function toYYYYMMDD(dateStr) { 
        if(dateStr && dateStr.match(/^\d{2}-\d{2}-\d{4}$/)){ const [d,m,y]=dateStr.split('-'); return `${y}-${m}-${d}`; } 
        return dateStr; 
    }
    function showMessage(container, text, isError) { 
        let div=document.getElementById(container); 
        if(div) div.innerHTML=`<div class="message ${isError?'error-msg':'success-msg'}"><i class="fas ${isError?'fa-exclamation-triangle':'fa-check-circle'}"></i> ${text}</div>`; 
        setTimeout(()=>{ if(div) div.innerHTML=''; }, 4000);
    }
    
    async function fetchExpenses(){
        document.getElementById('tableBody').innerHTML='<tr><td colspan="5" style="text-align:center;padding:48px;"><i class="fas fa-spinner fa-pulse"></i> Loading...</td></tr>';
        try{
            const res=await fetch(`${SCRIPT_URL}?action=getExpenses`);
            if(!res.ok)throw new Error(`HTTP ${res.status}`);
            const data=await res.json();
            if(data.status==='success' && Array.isArray(data.data)){
                allExpenses=data.data.map(item=>({ 
                    id:item.id, dateRaw:item.date, date:toYYYYMMDD(item.date), reason:item.reason||'', description:item.description||'', amount:parseFloat(item.amount)||0 
                }));
                allExpenses.sort((a,b)=>new Date(b.date)-new Date(a.date));
                applyFilters();
            } else throw new Error(data.message||'Invalid data');
        } catch(err){ 
            showMessage('listMessage','❌ Failed to load: '+err.message,true); 
            allExpenses=[]; applyFilters(); 
        }
    }
    
    function applyFilters(){
        const term=document.getElementById('searchInput').value.toLowerCase();
        const start=document.getElementById('startDateFilter').value;
        const end=document.getElementById('endDateFilter').value;
        
        filteredExpenses=allExpenses.filter(e=>{
            if(term && !e.reason.toLowerCase().includes(term) && !(e.description && e.description.toLowerCase().includes(term))) return false;
            if(start && e.date < start) return false;
            if(end && e.date > end) return false;
            if(reasonFilterSet.size > 0 && !reasonFilterSet.has(e.reason)) return false;
            return true;
        });
        const total=filteredExpenses.reduce((s,e)=>s+e.amount,0);
        document.getElementById('totalAmount').innerHTML=formatINR(total);
        currentPage=1; 
        renderTable();
        updateReasonFilterUI();
    }
    
    function updateReasonFilterUI() {
        const uniqueReasons = [...new Set(allExpenses.map(e => e.reason).filter(r=>r))];
        const dropdown = document.getElementById('reasonFilterDropdown');
        if(!dropdown) return;
        dropdown.innerHTML = `
            <div class="filter-header"><i class="fas fa-filter"></i> Filter by Reason</div>
            <input type="text" class="filter-search" id="reasonFilterSearch" placeholder="Search reasons...">
            <div id="reasonFilterOptions"></div>
            <div class="filter-actions"><button id="clearReasonFilter" class="btn-secondary" style="padding:4px 12px;">Clear</button><button id="applyReasonFilter" class="btn-primary" style="padding:4px 12px;">Apply</button></div>
        `;
        const optionsContainer = document.getElementById('reasonFilterOptions');
        function renderOptions(searchTerm='') {
            const filtered = uniqueReasons.filter(r => r.toLowerCase().includes(searchTerm.toLowerCase()));
            optionsContainer.innerHTML = filtered.map(reason => `
                <div class="filter-option"><input type="checkbox" value="${reason.replace(/"/g, '&quot;')}" ${reasonFilterSet.has(reason) ? 'checked' : ''}> <span>${reason}</span></div>
            `).join('');
        }
        renderOptions();
        const searchInput = document.getElementById('reasonFilterSearch');
        if(searchInput) searchInput.addEventListener('input', (e) => renderOptions(e.target.value));
        document.getElementById('applyReasonFilter')?.addEventListener('click', () => {
            const checkboxes = optionsContainer.querySelectorAll('input[type="checkbox"]');
            reasonFilterSet.clear();
            checkboxes.forEach(cb => { if(cb.checked) reasonFilterSet.add(cb.value); });
            applyFilters();
            document.getElementById('reasonFilterDropdown').classList.remove('show');
        });
        document.getElementById('clearReasonFilter')?.addEventListener('click', () => {
            reasonFilterSet.clear();
            applyFilters();
            document.getElementById('reasonFilterDropdown').classList.remove('show');
        });
    }
    
    let editingRowId = null;
    async function deleteExpenseById(id, reasonText) {
        if(confirm(`⚠️ Are you sure you want to permanently delete this expense?\nReason: ${reasonText}\nThis action cannot be undone.`)) {
            try{
                const fd=new URLSearchParams(); fd.append('action','deleteExpense'); fd.append('id', id);
                const resp=await fetch(SCRIPT_URL,{method:'POST',body:fd});
                const result=await resp.json();
                if(result.status==='success'){ showMessage('listMessage','✅ Expense deleted successfully', false); await fetchExpenses(); }
                else throw new Error(result.message);
            } catch(err){ showMessage('listMessage','❌ Delete failed: '+err.message, true); }
        }
    }
    
    function renderTable(){
        const totalPages=Math.ceil(filteredExpenses.length/rowsPerPage);
        const start=(currentPage-1)*rowsPerPage;
        const pageData=filteredExpenses.slice(start,start+rowsPerPage);
        const tbody=document.getElementById('tableBody');
        if(pageData.length===0){ tbody.innerHTML='<tr><td colspan="5" style="text-align:center;padding:48px;">📭 No records found</td></tr>'; document.getElementById('paginationControls').innerHTML=''; return; }
        tbody.innerHTML='';
        pageData.forEach(exp=>{
            const row=tbody.insertRow();
            row.insertCell(0).innerText=formatDateDDMM(exp.dateRaw||exp.date);
            row.insertCell(1).innerText=exp.reason;
            const descCell=row.insertCell(2); descCell.className='description-cell'; descCell.innerText=exp.description || '—';
            row.insertCell(3).innerHTML=formatINR(exp.amount);
            const actionCell=row.insertCell(4);
            actionCell.className='actions-cell';
            const div=document.createElement('div'); div.className='action-buttons';
            const editBtn=document.createElement('button'); editBtn.innerHTML='<i class="fas fa-pen"></i> Edit'; editBtn.className='edit-action-btn';
            editBtn.onclick=()=>enableInlineEdit(row, exp);
            const delBtn=document.createElement('button'); delBtn.innerHTML='<i class="fas fa-trash-alt"></i> Delete'; delBtn.className='delete-action-btn';
            delBtn.onclick=()=>deleteExpenseById(exp.id, exp.reason);
            div.appendChild(editBtn); div.appendChild(delBtn);
            actionCell.appendChild(div);
        });
        const pagDiv=document.getElementById('paginationControls'); pagDiv.innerHTML='';
        if(totalPages>1){
            const prev=document.createElement('button'); prev.innerHTML='<i class="fas fa-chevron-left"></i> Prev'; prev.className='page-item'; if(currentPage===1)prev.disabled=true;
            prev.onclick=()=>{if(currentPage>1){currentPage--;renderTable();}}; pagDiv.appendChild(prev);
            for(let i=1;i<=Math.min(totalPages,5);i++){ const pg=document.createElement('button'); pg.innerText=i; pg.className=`page-item ${currentPage===i?'active-page':''}`; pg.onclick=()=>{currentPage=i;renderTable();}; pagDiv.appendChild(pg); }
            const next=document.createElement('button'); next.innerHTML='Next <i class="fas fa-chevron-right"></i>'; next.className='page-item'; if(currentPage===totalPages)next.disabled=true;
            next.onclick=()=>{if(currentPage<totalPages){currentPage++;renderTable();}}; pagDiv.appendChild(next);
        }
    }
    
    function enableInlineEdit(row, exp){
        if(editingRowId === exp.id) return;
        const cells = row.cells;
        const origDate = exp.dateRaw || exp.date;
        cells[0].innerHTML = `<input type="date" class="inline-edit-input" id="editDate_${exp.id}" value="${toYYYYMMDD(origDate)}">`;
        cells[1].innerHTML = `<input type="text" class="inline-edit-input" id="editReason_${exp.id}" value="${exp.reason.replace(/"/g, '&quot;')}">`;
        cells[2].innerHTML = `<textarea class="inline-edit-textarea" id="editDesc_${exp.id}" rows="2">${(exp.description||'').replace(/"/g, '&quot;')}</textarea>`;
        cells[3].innerHTML = `<input type="number" step="1" class="inline-edit-input" id="editAmount_${exp.id}" value="${Math.round(exp.amount)}">`;
        const actionCell = cells[4]; actionCell.innerHTML = '';
        const saveBtn = document.createElement('button'); saveBtn.innerHTML = '<i class="fas fa-save"></i> Save'; saveBtn.className = 'save-btn';
        const cancelBtn = document.createElement('button'); cancelBtn.innerHTML = 'Cancel'; cancelBtn.className = 'cancel-btn';
        saveBtn.onclick = async () => {
            const newDate = document.getElementById(`editDate_${exp.id}`).value;
            const newReason = document.getElementById(`editReason_${exp.id}`).value.trim();
            const newDesc = document.getElementById(`editDesc_${exp.id}`).value.trim();
            const newAmount = parseFloat(document.getElementById(`editAmount_${exp.id}`).value);
            if(!newDate || !newReason || isNaN(newAmount) || newAmount <= 0){ showMessage('listMessage', 'Invalid data.', true); return; }
            saveBtn.disabled = true; saveBtn.innerHTML = '<span class="spinner-small"></span>Saving';
            try{
                const fd = new URLSearchParams(); fd.append('action', 'updateExpense'); fd.append('id', exp.id); fd.append('date', newDate); fd.append('reason', newReason); fd.append('description', newDesc); fd.append('amount', newAmount);
                const resp = await fetch(SCRIPT_URL, { method: 'POST', body: fd }); const result = await resp.json();
                if(result.status === 'success'){ showMessage('listMessage', '✅ Updated', false); await fetchExpenses(); } else throw new Error(result.message);
            } catch(err){ showMessage('listMessage', '❌ Update error: ' + err.message, true); await fetchExpenses(); }
            editingRowId = null;
        };
        cancelBtn.onclick = () => { fetchExpenses(); editingRowId = null; };
        actionCell.appendChild(saveBtn); actionCell.appendChild(cancelBtn);
        editingRowId = exp.id;
    }
    
    async function addExpense(date, reason, description, amount){
        const fd=new URLSearchParams(); fd.append('action','addExpense'); fd.append('date',date); fd.append('reason',reason); fd.append('description',description||''); fd.append('amount',Math.round(amount));
        const resp=await fetch(SCRIPT_URL,{method:'POST',body:fd}); return resp.json();
    }
    
    function initDropdown(){
        const input=document.getElementById('expenseReason'), dropdown=document.getElementById('reasonDropdown');
        function update(filter){
            const filtered=PREDEFINED_REASONS.filter(r=>r.toLowerCase().includes(filter.toLowerCase()));
            dropdown.innerHTML=filtered.map(r=>`<div class="dropdown-item" data-value="${r}">${r}</div>`).join('');
            if(filtered.length===0 && filter.trim()) dropdown.innerHTML=`<div class="dropdown-item" data-value="${filter}">➕ Add "${filter}"</div>`;
            dropdown.querySelectorAll('.dropdown-item').forEach(el=>el.addEventListener('click',()=>{ input.value=el.dataset.value; dropdown.classList.remove('show'); }));
            if(dropdown.children.length) dropdown.classList.add('show');
        }
        input.addEventListener('focus',()=>update(input.value)); input.addEventListener('input',()=>update(input.value));
        document.addEventListener('click',(e)=>{ if(!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.remove('show'); });
        update('');
    }
    
    document.getElementById('searchInput').addEventListener('input',applyFilters);
    document.getElementById('startDateFilter').addEventListener('change',applyFilters);
    document.getElementById('endDateFilter').addEventListener('change',applyFilters);
    document.getElementById('clearFiltersBtn').addEventListener('click',()=>{
        document.getElementById('searchInput').value=''; document.getElementById('startDateFilter').value=''; document.getElementById('endDateFilter').value=''; reasonFilterSet.clear(); applyFilters();
    });
    document.getElementById('reasonFilterIcon').addEventListener('click',(e)=>{ e.stopPropagation(); const dd=document.getElementById('reasonFilterDropdown'); dd.classList.toggle('show'); updateReasonFilterUI(); });
    document.addEventListener('click',(e)=>{ if(!e.target.closest('#reasonFilterIcon') && !e.target.closest('#reasonFilterDropdown')) document.getElementById('reasonFilterDropdown')?.classList.remove('show'); });
    
    document.getElementById('submitExpenseBtn').addEventListener('click',async()=>{
        let date=document.getElementById('expenseDate').value;
        const reason=document.getElementById('expenseReason').value.trim();
        const description=document.getElementById('expenseDescription').value.trim();
        const amount=parseFloat(document.getElementById('expenseAmount').value);
        if(!date||!reason||isNaN(amount)||amount<=0){ showMessage('formMessage','Required fields missing',true); return; }
        const btn=document.getElementById('submitExpenseBtn'); const orig=btn.innerHTML;
        btn.disabled=true; btn.innerHTML='<span class="spinner-small"></span>Saving...';
        try{
            const result=await addExpense(date,reason,description,amount);
            if(result.status==='success'){ showMessage('formMessage','Recorded!',false); document.getElementById('expenseReason').value=''; document.getElementById('expenseDescription').value=''; document.getElementById('expenseAmount').value=''; document.getElementById('expenseDate').value=new Date().toISOString().split('T')[0]; await fetchExpenses(); document.querySelector('.tab-btn[data-tab="list"]').click(); }
            else throw new Error(result.message);
        } catch(err){ showMessage('formMessage','Failed: '+err.message,true); }
        finally{ btn.disabled=false; btn.innerHTML=orig; }
    });
    document.getElementById('resetFormBtn').addEventListener('click',()=>{ document.getElementById('expenseDate').value=new Date().toISOString().split('T')[0]; document.getElementById('expenseReason').value=''; document.getElementById('expenseDescription').value=''; document.getElementById('expenseAmount').value=''; document.getElementById('formMessage').innerHTML=''; });
    document.querySelectorAll('.tab-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active-pane')); btn.classList.add('active'); document.getElementById(btn.getAttribute('data-tab')+'Panel').classList.add('active-pane'); if(btn.getAttribute('data-tab')==='list') fetchExpenses(); }); });
    document.getElementById('expenseDate').value=new Date().toISOString().split('T')[0];
    initDropdown(); fetchExpenses();
</script>
</body>
</html>
