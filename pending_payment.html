<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Goodness Health | Pending Tasks Manager</title>
    <!-- Google Fonts: Rubik + DM Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 (Free Icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0F3D5E;
            font-family: 'DM Sans', system-ui, -apple-system, 'Segoe UI', sans-serif;
            color: #1A2C3C;
            line-height: 1.45;
        }

        html {
            scroll-behavior: smooth;
        }

        .app-container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 24px 28px;
        }

        .health-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 32px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-icon {
            background: linear-gradient(135deg, #1ECAD3, #0FA9B2);
            width: 48px;
            height: 48px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 20px -10px rgba(0,0,0,0.3);
        }

        .logo-icon i {
            font-size: 26px;
            color: white;
        }

        .logo-text h1 {
            font-family: 'Rubik', sans-serif;
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.3px;
            background: linear-gradient(to right, #FFF, #C0E0FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: #9DC3E6;
            font-weight: 500;
        }

        .badge-premium {
            background: rgba(30,202,211,0.18);
            backdrop-filter: blur(4px);
            padding: 8px 18px;
            border-radius: 60px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #D2F0F2;
            border: 1px solid rgba(30,202,211,0.3);
        }

        .dashboard-card {
            background: #F5F7FA;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .filters-section {
            padding: 24px 28px;
            background: white;
            border-bottom: 1px solid #E5EAF0;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 170px;
        }

        .filter-group label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: #1F5E7E;
            font-family: 'Rubik', sans-serif;
        }

        .filter-group input {
            padding: 12px 16px;
            border: 1.5px solid #E2E8F0;
            border-radius: 16px;
            font-family: 'DM Sans', monospace;
            font-size: 0.9rem;
            background: #FFFFFF;
            transition: all 0.2s ease;
            outline: none;
        }

        .filter-group input:focus {
            border-color: #1ECAD3;
            box-shadow: 0 0 0 3px rgba(30,202,211,0.2);
        }

        .search-wrapper {
            flex: 2;
            min-width: 240px;
            position: relative;
        }

        .search-wrapper i {
            position: absolute;
            left: 16px;
            top: 38px;
            color: #89A9C9;
            font-size: 1rem;
        }

        .search-input {
            padding: 12px 16px 12px 44px !important;
            width: 100%;
            border-radius: 100px;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #B9CFE4;
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: #1F5E7E;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-outline:hover {
            background: rgba(30,202,211,0.08);
            border-color: #1ECAD3;
            color: #0F3D5E;
        }

        .stats-row {
            padding: 18px 28px 0 28px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            font-size: 0.85rem;
            color: #2A577B;
            font-weight: 500;
            background: white;
        }

        .table-container {
            overflow-x: auto;
            padding: 0 24px 0 24px;
            background: white;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            border: 1px solid #DCE5EC;
        }

        .data-table th,
        .data-table td {
            border: 1px solid #E2EBF3;
            padding: 14px 16px;
            vertical-align: middle;
        }

        .data-table th:nth-child(2),
        .data-table td:nth-child(2) {
            min-width: 180px;
            width: 180px;
        }

        .data-table th {
            text-align: left;
            background: #F9FBFD;
            font-family: 'Rubik', sans-serif;
            font-weight: 600;
            color: #0F3D5E;
            border-bottom: 2px solid #D0DDE8;
            position: sticky;
            top: 0;
        }

        .data-table td {
            color: #1F3E54;
        }

        .data-table tr:hover td {
            background-color: #F0F9FD;
            transition: 0.1s;
        }

        .status-pending {
            background: #FEF3E2;
            color: #C46F1A;
            padding: 6px 14px;
            border-radius: 60px;
            font-weight: 600;
            font-size: 0.7rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            width: fit-content;
            font-family: 'Rubik', monospace;
        }

        /* Pagination Styles */
        .pagination-container {
            padding: 20px 28px 28px 28px;
            background: white;
            border-radius: 0 0 28px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            border-top: 1px solid #E5EAF0;
        }

        .pagination-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .page-btn {
            background: white;
            border: 1px solid #D0DDE8;
            padding: 8px 14px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1F5E7E;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .page-btn:hover:not(:disabled) {
            background: #1ECAD3;
            border-color: #1ECAD3;
            color: white;
        }

        .page-btn.active {
            background: #1ECAD3;
            border-color: #1ECAD3;
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .page-numbers {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .page-number {
            background: white;
            border: 1px solid #D0DDE8;
            padding: 8px 13px;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            color: #1F5E7E;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 40px;
            text-align: center;
        }

        .page-number:hover {
            background: #1ECAD3;
            border-color: #1ECAD3;
            color: white;
        }

        .page-number.active {
            background: #1ECAD3;
            border-color: #1ECAD3;
            color: white;
        }

        .rows-per-page {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rows-per-page select {
            padding: 8px 12px;
            border: 1.5px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            background: white;
            cursor: pointer;
            outline: none;
        }

        .rows-per-page select:focus {
            border-color: #1ECAD3;
        }

        .pagination-info {
            color: #2A577B;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .loader-state, .empty-msg, .error-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            gap: 14px;
            background: #FBFDFF;
            border-radius: 28px;
            color: #2C6283;
            font-weight: 500;
        }

        .error-msg {
            background: #FFF6F0;
            color: #C4450C;
        }

        @media (max-width: 768px) {
            .data-table th:nth-child(2),
            .data-table td:nth-child(2) {
                min-width: 140px;
                width: auto;
            }
            
            .pagination-container {
                flex-direction: column;
                align-items: stretch;
            }
            
            .pagination-controls {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="health-header">
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fas fa-heartbeat"></i>
            </div>
            <div class="logo-text">
                <h1>Pending Payment</h1>
            </div>
        </div>
    </div>

    <div class="dashboard-card">
        <div class="filters-section">
            <div class="filter-group">
                <label><i class="far fa-calendar-alt"></i> From Date</label>
                <input type="date" id="fromDateFilter" placeholder="Start date">
            </div>
            <div class="filter-group">
                <label><i class="far fa-calendar-check"></i> To Date</label>
                <input type="date" id="toDateFilter" placeholder="End date">
            </div>
            <div class="search-wrapper">
                <label><i class="fas fa-search"></i> Global search</label>
                <input type="text" id="globalSearchInput" class="search-input" placeholder="Search patient, service, ID, amount...">
            </div>
            <div>
                <button class="btn-outline" id="resetFiltersBtn"><i class="fas fa-undo-alt"></i> Reset</button>
            </div>
        </div>

        <div class="stats-row" id="statsDisplay">
            <span><i class="fas fa-spinner fa-pulse"></i> Connecting to sheet...</span>
            <span><i class="fas fa-filter"></i> Status: <strong style="color:#0F3D5E;">Pending only</strong> (automatic)</span>
        </div>

        <div class="table-container" id="dynamicTableContainer">
            <div class="loader-state">
                <i class="fas fa-sync-alt fa-spin" style="font-size: 32px; color:#1ECAD3;"></i>
                <p>Fetching medical records from secure sheet</p>
            </div>
        </div>
        
        <!-- Pagination Section -->
        <div class="pagination-container" id="paginationContainer" style="display: none;">
            <div class="pagination-info" id="paginationInfo">
                Showing 0 to 0 of 0 entries
            </div>
            <div class="pagination-controls">
                <button class="page-btn" id="firstPageBtn" disabled>
                    <i class="fas fa-angle-double-left"></i> First
                </button>
                <button class="page-btn" id="prevPageBtn" disabled>
                    <i class="fas fa-chevron-left"></i> Prev
                </button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button class="page-btn" id="nextPageBtn" disabled>
                    Next <i class="fas fa-chevron-right"></i>
                </button>
                <button class="page-btn" id="lastPageBtn" disabled>
                    Last <i class="fas fa-angle-double-right"></i>
                </button>
            </div>
            <div class="rows-per-page">
                <span>Rows per page:</span>
                <select id="rowsPerPageSelect">
                    <option value="10">10</option>
                    <option value="20" selected>20</option>
                    <option value="50">50</option>
                    <option value="100">100</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script>
    const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSP_1ebSEqsx3j6hnm39yDDrgnVpGIKXLghgscZnMb2irSAIZt2EJzLJVB0MhhdxnNl1spVICiwwgBB/pub?gid=0&single=true&output=csv';
    
    let masterSheetData = [];
    let filteredPendingData = [];
    
    // Pagination variables
    let currentPage = 1;
    let rowsPerPage = 20;
    let totalPages = 1;

    const fromDateEl = document.getElementById('fromDateFilter');
    const toDateEl = document.getElementById('toDateFilter');
    const globalSearchEl = document.getElementById('globalSearchInput');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const containerDiv = document.getElementById('dynamicTableContainer');
    const statsSpan = document.getElementById('statsDisplay');
    const paginationContainer = document.getElementById('paginationContainer');
    const firstPageBtn = document.getElementById('firstPageBtn');
    const prevPageBtn = document.getElementById('prevPageBtn');
    const nextPageBtn = document.getElementById('nextPageBtn');
    const lastPageBtn = document.getElementById('lastPageBtn');
    const pageNumbersDiv = document.getElementById('pageNumbers');
    const rowsPerPageSelect = document.getElementById('rowsPerPageSelect');
    const paginationInfo = document.getElementById('paginationInfo');

    function parseMedicalDate(dateStr) {
        if (!dateStr || dateStr.trim() === '') return null;
        let cleaned = dateStr.toString().trim();
        let standardDate = new Date(cleaned);
        if (!isNaN(standardDate.getTime())) return standardDate;
        if (cleaned.includes('/')) {
            let parts = cleaned.split('/');
            if (parts.length === 3) {
                let day, month, year;
                if (parseInt(parts[0],10) > 12) {
                    day = parseInt(parts[0],10);
                    month = parseInt(parts[1],10) - 1;
                    year = parseInt(parts[2],10);
                } else {
                    month = parseInt(parts[0],10) - 1;
                    day = parseInt(parts[1],10);
                    year = parseInt(parts[2],10);
                }
                let d = new Date(year, month, day);
                if (!isNaN(d.getTime())) return d;
            }
        }
        return null;
    }

    function isWithinDateRange(dateCell, fromDateObj, toDateObj) {
        if (!dateCell) return false;
        const rowDate = parseMedicalDate(dateCell);
        if (!rowDate) return false;
        if (fromDateObj && rowDate < fromDateObj) return false;
        if (toDateObj && rowDate > toDateObj) return false;
        return true;
    }

    function matchesGlobal(rowObj, term) {
        if (!term || term.trim() === '') return true;
        const lowerTerm = term.trim().toLowerCase();
        for (let key in rowObj) {
            let val = rowObj[key];
            if (val !== undefined && val !== null && String(val).toLowerCase().includes(lowerTerm)) {
                return true;
            }
        }
        return false;
    }

    function applyFiltersAndRender() {
        if (!masterSheetData.length) {
            filteredPendingData = [];
            currentPage = 1;
            renderTable();
            updateStatsUI();
            return;
        }

        const fromRaw = fromDateEl.value;
        const toRaw = toDateEl.value;
        const fromDateObj = fromRaw ? new Date(fromRaw) : null;
        const toDateObj = toRaw ? new Date(toRaw) : null;
        const searchTerm = globalSearchEl.value;

        let pendingRows = masterSheetData.filter(row => {
            let statusVal = (row.status || '').toString().trim().toLowerCase();
            return statusVal === 'pending';
        });

        let dateFiltered = pendingRows.filter(row => {
            return isWithinDateRange(row.date, fromDateObj, toDateObj);
        });

        let finalFiltered = dateFiltered.filter(row => matchesGlobal(row, searchTerm));
        filteredPendingData = finalFiltered;
        
        // Reset to first page when filters change
        currentPage = 1;
        updatePagination();
        renderTable();
        updateStatsUI();
    }

    function updateStatsUI() {
        if (!masterSheetData.length) {
            statsSpan.innerHTML = `<span><i class="fas fa-database"></i> No data loaded</span><span><i class="fas fa-check-circle"></i> Pending filter active</span>`;
            return;
        }
        const totalPendingRaw = masterSheetData.filter(r => (r.status || '').toLowerCase() === 'pending').length;
        const shown = filteredPendingData.length;
        statsSpan.innerHTML = `<span><i class="fas fa-clinic-medical"></i> Showing ${shown} of ${totalPendingRaw} pending cases | Total records: ${masterSheetData.length}</span>
                               <span><i class="fas fa-chart-line"></i> Medical-grade filter · <i class="fas fa-hourglass-half"></i> Pending only</span>`;
    }

    function updatePagination() {
        totalPages = Math.ceil(filteredPendingData.length / rowsPerPage);
        if (totalPages === 0) totalPages = 1;
        if (currentPage > totalPages) currentPage = totalPages;
        
        // Show/hide pagination container
        if (filteredPendingData.length > rowsPerPage) {
            paginationContainer.style.display = 'flex';
        } else {
            paginationContainer.style.display = 'none';
        }
        
        // Update buttons state
        firstPageBtn.disabled = currentPage === 1;
        prevPageBtn.disabled = currentPage === 1;
        nextPageBtn.disabled = currentPage === totalPages;
        lastPageBtn.disabled = currentPage === totalPages;
        
        // Update pagination info
        const start = (currentPage - 1) * rowsPerPage + 1;
        const end = Math.min(currentPage * rowsPerPage, filteredPendingData.length);
        if (filteredPendingData.length === 0) {
            paginationInfo.textContent = `Showing 0 to 0 of 0 entries`;
        } else {
            paginationInfo.textContent = `Showing ${start} to ${end} of ${filteredPendingData.length} entries`;
        }
        
        // Render page numbers
        renderPageNumbers();
    }
    
    function renderPageNumbers() {
        pageNumbersDiv.innerHTML = '';
        
        let startPage = Math.max(1, currentPage - 2);
        let endPage = Math.min(totalPages, currentPage + 2);
        
        if (endPage - startPage < 4) {
            if (startPage > 1) {
                startPage = Math.max(1, endPage - 4);
            }
            if (endPage < totalPages) {
                endPage = Math.min(totalPages, startPage + 4);
            }
        }
        
        for (let i = startPage; i <= endPage; i++) {
            const pageBtn = document.createElement('button');
            pageBtn.className = 'page-number' + (i === currentPage ? ' active' : '');
            pageBtn.textContent = i;
            pageBtn.onclick = () => {
                currentPage = i;
                renderTable();
                updatePagination();
            };
            pageNumbersDiv.appendChild(pageBtn);
        }
    }
    
    function getCurrentPageData() {
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        return filteredPendingData.slice(start, end);
    }

    function renderTable() {
        if (filteredPendingData.length === 0 && masterSheetData.length > 0) {
            containerDiv.innerHTML = `<div class="empty-msg"><i class="fas fa-inbox" style="font-size: 2rem; color:#1ECAD3;"></i><br />No pending records match the filters. Adjust date or search.</div>`;
            paginationContainer.style.display = 'none';
            return;
        }
        if (filteredPendingData.length === 0 && masterSheetData.length === 0) {
            containerDiv.innerHTML = `<div class="empty-msg"><i class="fas fa-cloud-download-alt"></i><br />Waiting for Google Sheet data. Ensure published CSV is accessible.</div>`;
            paginationContainer.style.display = 'none';
            return;
        }
        
        // Get current page data
        const pageData = getCurrentPageData();
        
        // Get all columns from the first row
        let allColumns = Object.keys(filteredPendingData[0]);
        
        // Define the columns we want to display (excluding date and any extra status columns)
        let columnsToDisplay = [];
        
        // Priority columns in desired order (without date)
        const priorityColumns = ['ID', 'Patient', 'Service', 'Amount', 'Notes'];
        
        // First add priority columns if they exist
        priorityColumns.forEach(priorityCol => {
            const found = allColumns.find(col => col.toLowerCase() === priorityCol.toLowerCase());
            if (found && !columnsToDisplay.includes(found)) {
                columnsToDisplay.push(found);
            }
        });
        
        // Then add any remaining columns except 'date' and any column with 'status' (we'll add one at the end)
        allColumns.forEach(col => {
            const lowerCol = col.toLowerCase();
            if (lowerCol === 'date') return;
            if (lowerCol.includes('status')) return;
            if (columnsToDisplay.includes(col)) return;
            columnsToDisplay.push(col);
        });
        
        // Add ONE status column at the end
        const statusColumn = allColumns.find(col => col.toLowerCase().includes('status'));
        if (statusColumn && !columnsToDisplay.includes(statusColumn)) {
            columnsToDisplay.push(statusColumn);
        }
        
        // Build the table
        let html = `<table class="data-table"><thead><tr>`;
        columnsToDisplay.forEach(col => {
            let displayHeader = col.charAt(0).toUpperCase() + col.slice(1).replace(/([A-Z])/g, ' $1');
            html += `<th>${displayHeader}</th>`;
        });
        html += `</thead><tbody>`;
        
        for (let row of pageData) {
            html += `<tr>`;
            columnsToDisplay.forEach(col => {
                let cellVal = row[col] !== undefined && row[col] !== null ? row[col] : '—';
                let isStatusColumn = col.toLowerCase().includes('status');
                let content = '';
                if (isStatusColumn) {
                    content = `<span class="status-pending"><i class="fas fa-clock"></i> Pending</span>`;
                } else {
                    content = cellVal;
                }
                html += `<td>${content}</td>`;
            });
            html += `</tr>`;
        }
        html += `</tbody></table>`;
        containerDiv.innerHTML = html;
    }

    function csvToObjects(csvString) {
        const lines = csvString.split(/\r?\n/);
        if (lines.length < 2) return [];
        let headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            let values = [];
            let inQuote = false;
            let current = '';
            for (let ch of lines[i]) {
                if (ch === '"') {
                    inQuote = !inQuote;
                } else if (ch === ',' && !inQuote) {
                    values.push(current.trim());
                    current = '';
                } else {
                    current += ch;
                }
            }
            values.push(current.trim());
            if (values.length < headers.length) {
                while (values.length < headers.length) values.push('');
            }
            let obj = {};
            headers.forEach((h, idx) => {
                let rawVal = values[idx] ? values[idx].replace(/^"|"$/g, '') : '';
                obj[h] = rawVal;
            });
            let dateKey = headers.find(h => /date/i.test(h)) || headers[1];
            let statusKey = headers.find(h => /status/i.test(h)) || headers[2];
            if (dateKey) obj.date = obj[dateKey];
            else obj.date = '';
            if (statusKey) obj.status = obj[statusKey];
            else obj.status = '';
            rows.push(obj);
        }
        return rows;
    }

    async function loadSheetData() {
        containerDiv.innerHTML = `<div class="loader-state"><i class="fas fa-spinner fa-pulse" style="font-size: 36px; color:#1ECAD3;"></i><p>Loading secure medical records ...</p></div>`;
        try {
            const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status} - Sheet unavailable`);
            const csvText = await response.text();
            if (!csvText.trim()) throw new Error("Empty CSV data");
            const parsed = csvToObjects(csvText);
            if (parsed.length === 0) throw new Error("No rows found in sheet");
            masterSheetData = parsed;
            fromDateEl.value = '';
            toDateEl.value = '';
            globalSearchEl.value = '';
            applyFiltersAndRender();
        } catch (err) {
            console.error(err);
            containerDiv.innerHTML = `<div class="error-msg"><i class="fas fa-exclamation-triangle"></i> <strong>Could not fetch Google Sheet</strong><br />Ensure sheet is published as CSV. CORS/public access needed.<br />Details: ${err.message}</div>`;
            statsSpan.innerHTML = `<span><i class="fas fa-ban"></i> Data error</span><span>Check link or network</span>`;
            masterSheetData = [];
            filteredPendingData = [];
            paginationContainer.style.display = 'none';
        }
    }

    function bindEvents() {
        fromDateEl.addEventListener('change', () => applyFiltersAndRender());
        toDateEl.addEventListener('change', () => applyFiltersAndRender());
        globalSearchEl.addEventListener('input', () => applyFiltersAndRender());
        resetBtn.addEventListener('click', () => {
            fromDateEl.value = '';
            toDateEl.value = '';
            globalSearchEl.value = '';
            applyFiltersAndRender();
        });
        
        firstPageBtn.addEventListener('click', () => {
            currentPage = 1;
            renderTable();
            updatePagination();
        });
        
        prevPageBtn.addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                renderTable();
                updatePagination();
            }
        });
        
        nextPageBtn.addEventListener('click', () => {
            if (currentPage < totalPages) {
                currentPage++;
                renderTable();
                updatePagination();
            }
        });
        
        lastPageBtn.addEventListener('click', () => {
            currentPage = totalPages;
            renderTable();
            updatePagination();
        });
        
        rowsPerPageSelect.addEventListener('change', (e) => {
            rowsPerPage = parseInt(e.target.value);
            currentPage = 1;
            updatePagination();
            renderTable();
        });
    }

    function init() {
        bindEvents();
        loadSheetData();
    }
    init();
</script>
</body>
</html>
