<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SheetVision | Excel-Style Column Filters</title>
    <!-- SheetJS CDN with fallback -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <script>
        if (typeof XLSX === "undefined") {
            document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"><\/script>');
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f4f7fc;
            color: #1a2c3e;
            padding: 24px 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: linear-gradient(135deg, #0b2b3b 0%, #1a4b6e 100%);
            border-radius: 28px;
            padding: 28px 32px;
            margin-bottom: 32px;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            color: white;
        }
        .header h1 { font-size: 1.9rem; font-weight: 600; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header h1 i { background: rgba(255,255,255,0.2); padding: 10px; border-radius: 60px; font-size: 1.5rem; }
        .sub { margin-top: 10px; opacity: 0.85; font-size: 0.95rem; }
        .controls {
            background: white;
            border-radius: 24px;
            padding: 20px 28px;
            margin-bottom: 28px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.03);
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: flex-end;
            justify-content: space-between;
        }
        .filter-group { display: flex; flex-wrap: wrap; gap: 16px; align-items: flex-end; flex: 2; }
        .date-box, .search-box { display: flex; flex-direction: column; gap: 6px; }
        .date-box label, .search-box label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #4a627a; }
        input, button { font-family: 'Inter', sans-serif; }
        .date-box input, .search-box input {
            border: 1px solid #cfdfed;
            border-radius: 18px;
            padding: 10px 16px;
            font-size: 0.9rem;
            width: 180px;
        }
        .search-box input { width: 240px; }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 12px; }
        button {
            background: #ecf3f8;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1e4b6e;
            transition: all 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.primary { background: #1f7b9e; color: white; }
        button.primary:hover:not(:disabled) { background: #0e5f7e; transform: translateY(-1px); }
        button:hover:not(:disabled) { background: #e2eaf1; transform: translateY(-1px); }
        .stats {
            background: white;
            border-radius: 20px;
            padding: 12px 24px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .badge { background: #e7f0f5; padding: 6px 14px; border-radius: 40px; color: #1a5d7a; }
        .table-wrapper {
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            overflow-x: auto;
            border: 1px solid #eef3f9;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            min-width: 800px;
        }
        .data-table th {
            background: #f8fbfe;
            padding: 10px 12px;
            text-align: left;
            font-weight: 600;
            color: #1e4b6e;
            border-bottom: 2px solid #e2edf5;
            position: sticky;
            top: 0;
            z-index: 10;
            vertical-align: top;
        }
        .data-table td {
            padding: 12px 12px;
            border-bottom: 1px solid #ecf3f8;
            color: #1f2f3e;
            word-break: break-word;
        }
        .data-table tr:hover td { background-color: #fafeff; }
        
        /* Excel-Style Dropdown Filter Styles */
        .filter-header {
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
        }
        .header-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            user-select: none;
            padding: 4px 0;
        }
        .header-title span { font-weight: 600; font-size: 0.85rem; }
        .filter-icon {
            color: #8ba3bc;
            font-size: 0.75rem;
            transition: color 0.2s;
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
        }
        .filter-icon:hover { background: #e2eaf1; }
        .filter-icon.active { color: #1f7b9e; }
        
        /* Dropdown Container */
        .filter-dropdown {
            position: relative;
            width: 100%;
        }
        .dropdown-btn {
            width: 100%;
            padding: 6px 10px;
            background: white;
            border: 1px solid #cfdfed;
            border-radius: 12px;
            font-size: 0.75rem;
            text-align: left;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #4a627a;
        }
        .dropdown-btn span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .dropdown-btn:hover { background: #f8fbfe; border-color: #1f7b9e; }
        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #cfdfed;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
            z-index: 1000;
            max-height: 280px;
            overflow-y: auto;
            display: none;
            margin-top: 4px;
        }
        .dropdown-menu.show { display: block; }
        .dropdown-search {
            padding: 8px;
            border-bottom: 1px solid #e2edf5;
            position: sticky;
            top: 0;
            background: white;
        }
        .dropdown-search input {
            width: 100%;
            padding: 6px 10px;
            border: 1px solid #cfdfed;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .dropdown-options {
            max-height: 200px;
            overflow-y: auto;
        }
        .dropdown-option {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: background 0.1s;
        }
        .dropdown-option:hover { background: #e7f0f5; }
        .dropdown-option input { margin: 0; cursor: pointer; }
        .dropdown-option label { cursor: pointer; flex: 1; color: #1a2c3e; }
        .dropdown-actions {
            padding: 8px;
            border-top: 1px solid #e2edf5;
            display: flex;
            gap: 8px;
            justify-content: space-between;
            background: white;
            position: sticky;
            bottom: 0;
        }
        .dropdown-actions button {
            padding: 4px 12px;
            font-size: 0.7rem;
            background: #ecf3f8;
            border-radius: 16px;
        }
        .filter-badge {
            display: inline-block;
            background: #1f7b9e;
            color: white;
            font-size: 0.6rem;
            border-radius: 10px;
            padding: 2px 6px;
            margin-left: 6px;
        }
        
        @media (max-width: 700px) {
            body { padding: 16px 12px; }
            .controls { flex-direction: column; align-items: stretch; }
            .filter-group { flex-direction: column; width: 100%; }
            .date-box input, .search-box input { width: 100%; }
            .action-buttons { justify-content: flex-start; }
            .data-table th, .data-table td { padding: 8px 8px; font-size: 0.75rem; }
        }
        .empty-state { text-align: center; padding: 60px 24px; color: #7f9ab3; font-weight: 500; }
        .error-message { background: #ffe8e6; border-left: 5px solid #d9534f; padding: 14px 20px; border-radius: 16px; margin-bottom: 20px; color: #b33c37; }
        footer { margin-top: 32px; text-align: center; font-size: 0.75rem; color: #6f8eaa; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1><i class="fas fa-filter"></i> SheetVision Pro</h1>
        <div class="sub"><i class="fas fa-caret-down"></i> Excel-style dropdown column filters • Date range • Export</div>
    </div>

    <div class="controls">
        <div class="filter-group">
            <div class="date-box">
                <label><i class="far fa-calendar-alt"></i> FROM DATE</label>
                <input type="date" id="fromDate">
            </div>
            <div class="date-box">
                <label><i class="far fa-calendar-check"></i> TO DATE</label>
                <input type="date" id="toDate">
            </div>
            <div class="search-box">
                <label><i class="fas fa-search"></i> GLOBAL SEARCH</label>
                <input type="text" id="globalSearch" placeholder="Search any column...">
            </div>
        </div>
        <div class="action-buttons">
            <button id="resetFiltersBtn"><i class="fas fa-undo-alt"></i> Reset All</button>
            <button id="downloadFullBtn" disabled><i class="fas fa-download"></i> Full Excel</button>
            <button id="downloadFilteredBtn" class="primary" disabled><i class="fas fa-filter"></i> Download Filtered</button>
        </div>
    </div>

    <div class="stats" id="statsPanel">
        <span><i class="fas fa-database"></i> Loading data...</span>
        <span class="badge" id="filterCountBadge">—</span>
    </div>

    <div class="table-wrapper">
        <div id="tableContainer">
            <div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Fetching data...</div>
        </div>
    </div>
    <footer><i class="fas fa-caret-down"></i> Click dropdown on any column header to filter by specific values</footer>
</div>

<script>
    const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTXinJqkALxMdxrd0h26geavFTtx4wRKNvsa4uEMEbgvXD-lm7tRs3Ynz4b0qzzAoEq2IshzrZHzjdH/pub?gid=0&single=true&output=csv";
    
    let masterData = [];
    let headers = [];
    let isLoading = true;
    let fetchError = null;
    
    // Store selected values for each column (Set of selected strings)
    let columnSelections = {};
    let openDropdown = null;
    
    const fromDateInput = document.getElementById('fromDate');
    const toDateInput = document.getElementById('toDate');
    const globalSearchInput = document.getElementById('globalSearch');
    const resetBtn = document.getElementById('resetFiltersBtn');
    const downloadFullBtn = document.getElementById('downloadFullBtn');
    const downloadFilteredBtn = document.getElementById('downloadFilteredBtn');
    const tableContainer = document.getElementById('tableContainer');
    const statsPanel = document.getElementById('statsPanel');
    const filterCountBadge = document.getElementById('filterCountBadge');

    function parseDateFromValue(dateStr) {
        if (!dateStr || dateStr.trim() === '') return null;
        let trimmed = dateStr.trim();
        let d = new Date(trimmed);
        if (!isNaN(d.getTime())) return d;
        let parts = trimmed.split(/[\/\-\.]/);
        if (parts.length === 3) {
            let year, month, day;
            if (parts[0].length === 4) {
                year = parseInt(parts[0]);
                month = parseInt(parts[1]) - 1;
                day = parseInt(parts[2]);
            } else if (parts[2].length === 4) {
                year = parseInt(parts[2]);
                if (parseInt(parts[0]) > 12) {
                    day = parseInt(parts[0]);
                    month = parseInt(parts[1]) - 1;
                } else {
                    month = parseInt(parts[0]) - 1;
                    day = parseInt(parts[1]);
                }
            } else return null;
            let parsed = new Date(year, month, day);
            if (!isNaN(parsed.getTime())) return parsed;
        }
        return null;
    }

    // Get unique values for a column
    function getUniqueValues(colIndex) {
        const values = new Set();
        masterData.forEach(row => {
            let val = row.columns[colIndex];
            if (val !== undefined && val !== null && val.toString().trim() !== '') {
                values.add(val.toString());
            }
        });
        return Array.from(values).sort();
    }

    // Check if a row matches all column filters
    function matchesColumnFilters(row) {
        for (const [colIdxStr, selectedSet] of Object.entries(columnSelections)) {
            const colIdx = parseInt(colIdxStr);
            if (selectedSet.size === 0) continue;
            const cellValue = (row.columns[colIdx] !== undefined && row.columns[colIdx] !== null) ? row.columns[colIdx].toString() : '';
            if (!selectedSet.has(cellValue)) return false;
        }
        return true;
    }

    function getFilteredData() {
        if (!masterData.length) return [];

        const fromDateVal = fromDateInput.value;
        const toDateVal = toDateInput.value;
        const fromDate = fromDateVal ? new Date(fromDateVal) : null;
        const toDate = toDateVal ? new Date(toDateVal) : null;
        if (fromDate) fromDate.setHours(0,0,0,0);
        if (toDate) toDate.setHours(23,59,59,999);
        const globalSearchTerm = globalSearchInput.value.trim().toLowerCase();

        return masterData.filter(row => {
            // Date filter (2nd column)
            const dateRaw = row.columns[1] || '';
            const rowDate = parseDateFromValue(dateRaw);
            let dateMatch = true;
            if (fromDate && rowDate && rowDate < fromDate) dateMatch = false;
            if (toDate && rowDate && dateMatch && rowDate > toDate) dateMatch = false;
            if ((fromDate || toDate) && dateRaw && dateRaw.trim() !== '' && (!rowDate || isNaN(rowDate.getTime()))) dateMatch = false;
            if (!dateMatch) return false;

            // Column dropdown filters
            if (!matchesColumnFilters(row)) return false;

            // Global search
            if (globalSearchTerm !== '') {
                return row.columns.some(cell => String(cell || '').toLowerCase().includes(globalSearchTerm));
            }
            return true;
        });
    }

    // Close any open dropdown
    function closeDropdown() {
        if (openDropdown) {
            const menu = document.getElementById(`dropdown-menu-${openDropdown}`);
            if (menu) menu.classList.remove('show');
            openDropdown = null;
        }
    }

    // Handle click outside to close dropdown
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.filter-dropdown')) {
            closeDropdown();
        }
    });

    // Build dropdown HTML for a column
    function buildDropdownHTML(colIdx, columnName) {
        const uniqueValues = getUniqueValues(colIdx);
        const selectedSet = columnSelections[colIdx] || new Set();
        const hasSelection = selectedSet.size > 0;
        
        let optionsHtml = '';
        uniqueValues.forEach(value => {
            const isChecked = selectedSet.has(value);
            optionsHtml += `
                <div class="dropdown-option" data-value="${escapeHtml(value).replace(/"/g, '&quot;')}">
                    <input type="checkbox" value="${escapeHtml(value).replace(/"/g, '&quot;')}" ${isChecked ? 'checked' : ''}>
                    <label>${escapeHtml(value.length > 50 ? value.substring(0, 47) + '...' : value)}</label>
                </div>
            `;
        });
        
        const buttonText = hasSelection ? `${selectedSet.size} selected` : 'All';
        
        return `
            <div class="filter-dropdown" id="dropdown-${colIdx}">
                <div class="dropdown-btn" data-col="${colIdx}">
                    <span>${buttonText}</span>
                    <i class="fas fa-caret-down"></i>
                </div>
                <div class="dropdown-menu" id="dropdown-menu-${colIdx}">
                    <div class="dropdown-search">
                        <input type="text" placeholder="Search..." class="dropdown-search-input">
                    </div>
                    <div class="dropdown-options">
                        ${optionsHtml || '<div style="padding: 12px; text-align: center; color: #999;">No unique values</div>'}
                    </div>
                    <div class="dropdown-actions">
                        <button class="select-all-btn">Select All</button>
                        <button class="clear-all-btn">Clear All</button>
                    </div>
                </div>
            </div>
        `;
    }

    function renderTable() {
        if (!masterData.length && !isLoading) {
            const errorMsg = fetchError ? `<div class="error-message"><i class="fas fa-exclamation-circle"></i> ${fetchError}</div>` : '';
            tableContainer.innerHTML = `${errorMsg}<div class="empty-state"><i class="fas fa-database"></i> No data available.</div>`;
            statsPanel.innerHTML = `<span><i class="fas fa-database"></i> No data loaded</span>`;
            filterCountBadge.innerHTML = `0 rows`;
            return;
        }
        
        const filtered = getFilteredData();
        const total = masterData.length;
        const showing = filtered.length;
        statsPanel.innerHTML = `<span><i class="fas fa-table"></i> Total: ${total} &nbsp;|&nbsp; Showing: ${showing}</span>`;
        filterCountBadge.innerHTML = `<i class="fas fa-chart-simple"></i> Filtered: ${showing}`;
        
        let columnNames = (headers && headers.length) ? headers : (masterData[0]?.columns.map((_, idx) => `Column ${idx+1}`) || []);
        
        let html = `<table class="data-table"><thead>`;
        html += `<tr>`;
        columnNames.forEach((h, idx) => {
            const hasActiveFilter = columnSelections[idx] && columnSelections[idx].size > 0;
            html += `<th style="min-width: 140px;">
                        <div class="filter-header">
                            <div class="header-title">
                                <span>${escapeHtml(h)}</span>
                                <i class="fas fa-filter filter-icon ${hasActiveFilter ? 'active' : ''}" data-col="${idx}"></i>
                            </div>
                            ${buildDropdownHTML(idx, h)}
                        </div>
                    </th>`;
        });
        html += `</tr></thead><tbody>`;
        
        if (filtered.length === 0) {
            html += `<tr><td colspan="${columnNames.length}" class="empty-state" style="text-align:center;">No matching records</td></tr>`;
        } else {
            filtered.forEach(row => {
                html += `<tr>`;
                row.columns.forEach(cell => {
                    const displayValue = (cell !== undefined && cell !== null) ? String(cell) : '';
                    html += `<td title="${escapeHtml(displayValue.substring(0, 100))}">${escapeHtml(displayValue)}</td>`;
                });
                html += `</tr>`;
            });
        }
        html += `</tbody> </table>`;
        tableContainer.innerHTML = html;
        
        // Attach dropdown event listeners
        attachDropdownEvents();
    }
    
    function attachDropdownEvents() {
        // Dropdown button click
        document.querySelectorAll('.dropdown-btn').forEach(btn => {
            btn.removeEventListener('click', dropdownClickHandler);
            btn.addEventListener('click', dropdownClickHandler);
        });
        
        // Filter icon click (opens dropdown too)
        document.querySelectorAll('.filter-icon').forEach(icon => {
            icon.removeEventListener('click', iconClickHandler);
            icon.addEventListener('click', iconClickHandler);
        });
    }
    
    function dropdownClickHandler(e) {
        e.stopPropagation();
        const colIdx = parseInt(this.dataset.col);
        const menu = document.getElementById(`dropdown-menu-${colIdx}`);
        if (!menu) return;
        
        if (openDropdown === colIdx) {
            closeDropdown();
        } else {
            closeDropdown();
            menu.classList.add('show');
            openDropdown = colIdx;
            // Populate search and checkbox events for this dropdown
            setupDropdownInteractions(colIdx);
        }
    }
    
    function iconClickHandler(e) {
        e.stopPropagation();
        const colIdx = parseInt(this.dataset.col);
        const btn = document.querySelector(`.dropdown-btn[data-col="${colIdx}"]`);
        if (btn) btn.click();
    }
    
    function setupDropdownInteractions(colIdx) {
        const menu = document.getElementById(`dropdown-menu-${colIdx}`);
        if (!menu) return;
        
        // Search functionality
        const searchInput = menu.querySelector('.dropdown-search-input');
        const optionsContainer = menu.querySelector('.dropdown-options');
        
        if (searchInput) {
            searchInput.value = '';
            searchInput.oninput = (e) => {
                const term = e.target.value.toLowerCase();
                const options = optionsContainer.querySelectorAll('.dropdown-option');
                options.forEach(opt => {
                    const label = opt.querySelector('label').innerText.toLowerCase();
                    opt.style.display = label.includes(term) ? 'flex' : 'none';
                });
            };
        }
        
        // Checkbox change handlers
        const checkboxes = menu.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => {
            cb.onchange = (e) => {
                e.stopPropagation();
                updateColumnSelection(colIdx);
            };
        });
        
        // Option div click (toggle checkbox)
        const optionDivs = menu.querySelectorAll('.dropdown-option');
        optionDivs.forEach(opt => {
            opt.onclick = (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const cb = opt.querySelector('input');
                    if (cb) {
                        cb.checked = !cb.checked;
                        updateColumnSelection(colIdx);
                    }
                }
            };
        });
        
        // Select All button
        const selectAllBtn = menu.querySelector('.select-all-btn');
        if (selectAllBtn) {
            selectAllBtn.onclick = (e) => {
                e.stopPropagation();
                const allCheckboxes = menu.querySelectorAll('input[type="checkbox"]');
                allCheckboxes.forEach(cb => { cb.checked = true; });
                updateColumnSelection(colIdx);
            };
        }
        
        // Clear All button
        const clearAllBtn = menu.querySelector('.clear-all-btn');
        if (clearAllBtn) {
            clearAllBtn.onclick = (e) => {
                e.stopPropagation();
                const allCheckboxes = menu.querySelectorAll('input[type="checkbox"]');
                allCheckboxes.forEach(cb => { cb.checked = false; });
                updateColumnSelection(colIdx);
            };
        }
    }
    
    function updateColumnSelection(colIdx) {
        const menu = document.getElementById(`dropdown-menu-${colIdx}`);
        if (!menu) return;
        
        const selectedValues = new Set();
        const checkboxes = menu.querySelectorAll('input[type="checkbox"]:checked');
        checkboxes.forEach(cb => {
            selectedValues.add(cb.value);
        });
        
        if (selectedValues.size === 0) {
            delete columnSelections[colIdx];
        } else {
            columnSelections[colIdx] = selectedValues;
        }
        
        // Update button text
        const btn = document.querySelector(`.dropdown-btn[data-col="${colIdx}"]`);
        if (btn) {
            const span = btn.querySelector('span');
            if (span) {
                span.textContent = selectedValues.size > 0 ? `${selectedValues.size} selected` : 'All';
            }
        }
        
        // Update filter icon
        const icon = document.querySelector(`.filter-icon[data-col="${colIdx}"]`);
        if (icon) {
            if (selectedValues.size > 0) icon.classList.add('active');
            else icon.classList.remove('active');
        }
        
        renderTable();
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function getSafeTimestamp() {
        const now = new Date();
        return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}-${String(now.getMinutes()).padStart(2,'0')}-${String(now.getSeconds()).padStart(2,'0')}`;
    }
    
    function exportToExcel(filteredOnly = false) {
        if (typeof XLSX === 'undefined') { alert("❌ Excel library failed to load."); return false; }
        if (!masterData.length) { alert("⚠️ No data available."); return false; }
        
        let rowsForExport = filteredOnly ? getFilteredData() : masterData;
        if (rowsForExport.length === 0) { alert("⚠️ No data to export."); return false; }
        
        const exportType = filteredOnly ? "filtered data" : "full dataset";
        if (!confirm(`📊 Export ${exportType}?\nRows: ${rowsForExport.length}\nClick OK to proceed.`)) return false;
        
        let columnNames = (headers && headers.length) ? headers : (masterData[0]?.columns.map((_, idx) => `Column ${idx+1}`) || []);
        const sheetData = [columnNames];
        rowsForExport.forEach(row => {
            sheetData.push(row.columns.map(cell => (cell !== undefined && cell !== null) ? cell : ""));
        });
        
        try {
            const ws = XLSX.utils.aoa_to_sheet(sheetData);
            const colWidths = [];
            if (sheetData.length > 0) {
                for (let i = 0; i < sheetData[0].length; i++) {
                    let maxLen = sheetData[0][i] ? String(sheetData[0][i]).length : 10;
                    for (let j = 1; j < Math.min(sheetData.length, 100); j++) {
                        const cellVal = sheetData[j][i] ? String(sheetData[j][i]).length : 0;
                        if (cellVal > maxLen) maxLen = Math.min(cellVal, 50);
                    }
                    colWidths.push({ wch: Math.min(Math.max(maxLen + 2, 10), 40) });
                }
                ws['!cols'] = colWidths;
            }
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "SheetData");
            const timestamp = getSafeTimestamp();
            const fileName = filteredOnly ? `filtered_data_${timestamp}.xlsx` : `full_data_${timestamp}.xlsx`;
            
            const wbout = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
            const blob = new Blob([wbout], { type: "application/octet-stream" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            return true;
        } catch (err) {
            alert("❌ Export failed: " + err.message);
            return false;
        }
    }
    
    function parseCSVToRows(csvText) {
        const lines = [];
        let inQuoteBlock = false;
        let currentLine = '';
        for (let i = 0; i < csvText.length; i++) {
            const ch = csvText[i];
            if (ch === '"') { inQuoteBlock = !inQuoteBlock; currentLine += ch; }
            else if (ch === '\n' && !inQuoteBlock) { lines.push(currentLine); currentLine = ''; }
            else { currentLine += ch; }
        }
        if (currentLine) lines.push(currentLine);
        
        const rows = [];
        for (let line of lines) {
            if (line.trim() === '' && lines.length > 1) continue;
            const row = [];
            let inQuotes = false;
            let current = '';
            for (let i = 0; i < line.length; i++) {
                let ch = line[i];
                if (ch === '"') {
                    if (inQuotes && line[i+1] === '"') { current += '"'; i++; }
                    else { inQuotes = !inQuotes; }
                } else if (ch === ',' && !inQuotes) { row.push(current); current = ''; }
                else { current += ch; }
            }
            row.push(current);
            if (row.length > 1 || (row.length === 1 && row[0] !== '')) rows.push(row);
        }
        return rows;
    }
    
    async function fetchGoogleSheetData() {
        tableContainer.innerHTML = `<div class="empty-state"><i class="fas fa-spinner fa-pulse"></i> Fetching live data...</div>`;
        isLoading = true;
        fetchError = null;
        downloadFullBtn.disabled = true;
        downloadFilteredBtn.disabled = true;
        
        try {
            const response = await fetch(SHEET_CSV_URL, { cache: "no-store" });
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const csvText = await response.text();
            if (!csvText || csvText.trim().length === 0) throw new Error("Empty data");
            
            const parsedRows = parseCSVToRows(csvText);
            if (parsedRows.length === 0) throw new Error("No data rows");
            
            headers = parsedRows[0].map(h => (h && h.trim()) ? h.trim() : `Column`);
            const dataRows = parsedRows.slice(1);
            masterData = dataRows.map(row => {
                const fullRow = [...row];
                while (fullRow.length < headers.length) fullRow.push('');
                if (fullRow.length > headers.length) fullRow.length = headers.length;
                return { columns: fullRow };
            });
            fetchError = null;
        } catch (err) {
            fetchError = err.message || "Failed to load data";
            masterData = [];
            headers = [];
        } finally {
            isLoading = false;
            downloadFullBtn.disabled = false;
            downloadFilteredBtn.disabled = false;
            renderTable();
        }
    }
    
    function resetAllFilters() {
        fromDateInput.value = '';
        toDateInput.value = '';
        globalSearchInput.value = '';
        columnSelections = {};
        renderTable();
    }
    
    fromDateInput.addEventListener('change', () => renderTable());
    toDateInput.addEventListener('change', () => renderTable());
    globalSearchInput.addEventListener('input', () => renderTable());
    resetBtn.addEventListener('click', resetAllFilters);
    
    downloadFullBtn.addEventListener('click', () => {
        if (isLoading) { alert("⏳ Data loading..."); return; }
        if (!masterData.length) { alert("No data loaded"); return; }
        exportToExcel(false);
    });
    
    downloadFilteredBtn.addEventListener('click', () => {
        if (isLoading) { alert("⏳ Data loading..."); return; }
        if (!masterData.length) { alert("No data loaded"); return; }
        const filtered = getFilteredData();
        if (filtered.length === 0) { alert("No filtered data to export"); return; }
        exportToExcel(true);
    });
    
    fetchGoogleSheetData();
</script>
</body>
