// Build unified searchable items: tests + combos
function buildUnifiedItems() {
  const testItems = [];
  const comboItems = [];
  const allTestNames = new Set();
  
  labsData.forEach(lab => {
    lab.tests.forEach(test => { if(test.b2b !== null) allTestNames.add(test.name); });
    lab.combos.forEach(combo => { if(!comboItems.some(c => c.name === combo.name)) comboItems.push({ name: combo.name, type: "combo", tests: combo.tests, mrp: combo.mrp, b2b: combo.b2b }); });
  });
  
  allTestNames.forEach(testName => { testItems.push({ name: testName, type: "test" }); });
  
  return [...testItems, ...comboItems];
}

const unifiedItems = buildUnifiedItems();

// State: selected items (stores { name, type, tests (for combos) })
let selectedItems = []; // { name, type, tests (array) }
let selectedTestsFlat = []; // derived: all test names from individual tests + combo tests

// Helper: update flat tests list from selected items
function updateFlatTests() {
  const testsSet = new Set();
  selectedItems.forEach(item => {
    if(item.type === "test") testsSet.add(item.name);
    else if(item.type === "combo" && item.tests) item.tests.forEach(t => testsSet.add(t));
  });
  selectedTestsFlat = Array.from(testsSet);
}

// Check if a test is already covered by any selected combo
function isTestCoveredByCombo(testName) {
  return selectedItems.some(item => item.type === "combo" && item.tests && item.tests.includes(testName));
}

// Get all combo objects for search display
function getAllCombos() {
  const combosMap = new Map();
  labsData.forEach(lab => {
    lab.combos.forEach(combo => { if(!combosMap.has(combo.name)) combosMap.set(combo.name, combo); });
  });
  return Array.from(combosMap.values());
}

// DOM elements
const searchInput = document.getElementById("search"), suggestionsDiv = document.getElementById("suggestions");
const selectedTestsDiv = document.getElementById("selectedTests"), comparisonSection = document.getElementById("comparisonSection");
const comparisonTable = document.getElementById("comparisonTable"), resultDiv = document.getElementById("result");
const clearAllBtn = document.getElementById("clearAllBtn"), globalCopyBtn = document.getElementById("globalCopyBtn");
let selectedLabs = new Set(labsData.map(l => l.name));

function renderLabCheckboxes() {
  const container = document.getElementById("labCheckboxes");
  container.innerHTML = "";
  labsData.forEach(lab => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = selectedLabs.has(lab.name);
    cb.addEventListener("change", (e) => { if(e.target.checked) selectedLabs.add(lab.name); else selectedLabs.delete(lab.name); runOptimization(); renderComparison(); });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(lab.name));
    container.appendChild(label);
  });
}

// Add combo with conflict resolution
function addCombo(comboObj) {
  const comboName = comboObj.name;
  if(selectedItems.some(item => item.type === "combo" && item.name === comboName)) return;
  
  // Remove any individual tests that are part of this combo
  const testsInCombo = comboObj.tests;
  const updatedItems = selectedItems.filter(item => {
    if(item.type === "test" && testsInCombo.includes(item.name)) return false;
    return true;
  });
  
  selectedItems = [...updatedItems, { name: comboName, type: "combo", tests: testsInCombo, mrp: comboObj.mrp, b2b: comboObj.b2b }];
  updateFlatTests();
  renderSelected();
  runOptimization();
  searchInput.value = "";
  suggestionsDiv.innerHTML = "";
  searchInput.focus();
}

// Add individual test (only if not covered by any combo)
function addIndividualTest(testName) {
  if(isTestCoveredByCombo(testName)) {
    alert(`"${testName}" is already covered by a selected combo. Please remove the combo first to select it individually.`);
    return;
  }
  if(selectedItems.some(item => item.type === "test" && item.name === testName)) return;
  
  selectedItems.push({ name: testName, type: "test" });
  updateFlatTests();
  renderSelected();
  runOptimization();
  searchInput.value = "";
  suggestionsDiv.innerHTML = "";
  searchInput.focus();
}

function removeItem(itemName, itemType) {
  selectedItems = selectedItems.filter(item => !(item.name === itemName && item.type === itemType));
  updateFlatTests();
  renderSelected();
  runOptimization();
}

function clearAll() { selectedItems = []; updateFlatTests(); renderSelected(); runOptimization(); }

function renderSelected() {
  selectedTestsDiv.innerHTML = "";
  if(selectedItems.length === 0) { 
    selectedTestsDiv.innerHTML = '<div style="color:#7AB2B2; padding:12px; text-align:center;">No tests or combos selected. Start typing to add items.</div>'; 
    return; 
  }
  
  selectedItems.forEach(item => {
    const span = document.createElement("span");
    if(item.type === "combo") {
      span.className = "selected-combo";
      span.innerHTML = `<i class="fas fa-layer-group"></i> ${item.name} <i class="fas fa-times" style="font-size: 10px;"></i>`;
      span.onclick = (e) => { e.stopPropagation(); removeItem(item.name, "combo"); };
    } else {
      span.innerHTML = `<i class="fas fa-flask"></i> ${item.name} <i class="fas fa-times" style="font-size: 10px;"></i>`;
      span.onclick = (e) => { e.stopPropagation(); removeItem(item.name, "test"); };
    }
    selectedTestsDiv.appendChild(span);
  });
}

// Unified search: shows both tests and combos, combos are prioritized and clearly marked
searchInput.addEventListener("input", () => {
  const val = searchInput.value.toLowerCase().trim();
  suggestionsDiv.innerHTML = "";
  if(!val) return;
  
  const allCombos = getAllCombos();
  const comboMatches = allCombos.filter(combo => combo.name.toLowerCase().includes(val) && !selectedItems.some(s => s.type === "combo" && s.name === combo.name));
  const testMatches = unifiedItems.filter(item => item.type === "test" && item.name.toLowerCase().includes(val) && !selectedItems.some(s => s.type === "test" && s.name === item.name) && !isTestCoveredByCombo(item.name));
  
  // Show combos first
  comboMatches.forEach(combo => {
    const div = document.createElement("div");
    div.className = "suggestion-combo";
    div.innerHTML = `<i class="fas fa-layer-group"></i> <strong>${combo.name}</strong> <span class="combo-badge">Combo</span> <span style="font-size:11px; color:#7AB2B2;">(includes: ${combo.tests.slice(0,3).join(", ")}${combo.tests.length>3 ? "..." : ""})</span>`;
    div.onclick = () => addCombo(combo);
    suggestionsDiv.appendChild(div);
  });
  
  testMatches.forEach(item => {
    const div = document.createElement("div");
    div.className = "suggestion-test";
    div.innerHTML = `<i class="fas fa-flask"></i> ${item.name} <span class="combo-badge" style="background:#7AB2B220;">Test</span>`;
    div.onclick = () => addIndividualTest(item.name);
    suggestionsDiv.appendChild(div);
  });
  
  if(comboMatches.length === 0 && testMatches.length === 0) {
    const div = document.createElement("div");
    div.textContent = "No tests or combos found";
    div.style.color = "#7AB2B2";
    div.style.cursor = "default";
    suggestionsDiv.appendChild(div);
  }
});

document.addEventListener("click", (e) => { if(!searchInput.contains(e.target) && !suggestionsDiv.contains(e.target)) suggestionsDiv.innerHTML = ""; });

// ========== OPTIMIZATION ENGINE (uses selectedTestsFlat) ==========
function expandPackageTests(lab, pkg) { 
  let testsSet = new Set([...pkg.tests]); 
  if(pkg.combos) pkg.combos.forEach(cn => { const combo = lab.combos.find(c => c.name === cn); if(combo) combo.tests.forEach(t => testsSet.add(t)); }); 
  return Array.from(testsSet); 
}

function findCheapestIndividualTest(testName, activeLabsSet) {
  let best = null, minCost = Infinity;
  for(const lab of labsData) {
    if(!activeLabsSet.has(lab.name)) continue;
    const testObj = lab.tests.find(t => t.name === testName);
    if(testObj && testObj.b2b !== null && testObj.b2b < minCost) { minCost = testObj.b2b; best = { lab: lab.name, test: testObj, cost: testObj.b2b, type: "Test", name: testName, mrp: testObj.mrp }; }
  }
  return best;
}

function evaluateCombos(remainingSet, activeLabsSet) {
  const candidates = [];
  for(const lab of labsData) {
    if(!activeLabsSet.has(lab.name)) continue;
    for(const combo of lab.combos) {
      const covered = combo.tests.filter(t => remainingSet.has(t));
      if(covered.length === 0) continue;
      let indivCost = 0; let allExist = true;
      for(const t of covered) { const testObj = lab.tests.find(ts => ts.name === t); if(testObj && testObj.b2b !== null) indivCost += testObj.b2b; else { allExist = false; break; } }
      if(!allExist) continue;
      const savings = indivCost - combo.b2b;
      if(savings > 0) candidates.push({ lab: lab.name, labRef: lab, type: "Combo", item: combo, coveredTests: covered, coveredCount: covered.length, cost: combo.b2b, mrp: combo.mrp, savings, indivCost });
    }
  }
  candidates.sort((a,b)=>b.savings - a.savings || b.coveredCount - a.coveredCount);
  return candidates;
}

function evaluatePackages(remainingSet, activeLabsSet) {
  const candidates = [];
  for(const lab of labsData) {
    if(!activeLabsSet.has(lab.name)) continue;
    for(const pkg of lab.packages) {
      const expandedTests = expandPackageTests(lab, pkg);
      const covered = expandedTests.filter(t => remainingSet.has(t));
      if(covered.length === 0) continue;
      let indivCost = 0; let allOk = true;
      for(const t of covered) { const testObj = lab.tests.find(ts => ts.name === t); if(testObj && testObj.b2b !== null) indivCost += testObj.b2b; else { allOk = false; break; } }
      if(!allOk) continue;
      const savings = indivCost - pkg.b2b;
      if(savings > 0) candidates.push({ lab: lab.name, labRef: lab, type: "Package", item: pkg, coveredTests: covered, coveredCount: covered.length, cost: pkg.b2b, mrp: pkg.mrp, savings, indivCost });
    }
  }
  candidates.sort((a,b)=>b.savings - a.savings || b.coveredCount - a.coveredCount);
  return candidates;
}

function optimizePlan(userTests, activeLabsSet) {
  if(!userTests.length) return { items: [], totalB2B:0, totalMRP:0, savings:0, savingsPercent:0, missing:[] };
  const uniqueTests = [...new Set(userTests)];
  let remaining = new Set(uniqueTests);
  const selectedItemsPlan = [];
  while(remaining.size > 0) {
    const packageCandidates = evaluatePackages(remaining, activeLabsSet);
    const comboCandidates = evaluateCombos(remaining, activeLabsSet);
    const allCandidates = [...packageCandidates, ...comboCandidates];
    if(allCandidates.length === 0) break;
    let best = allCandidates.reduce((a,b)=> (a.savings * a.coveredCount) > (b.savings * b.coveredCount) ? a : b, allCandidates[0]);
    selectedItemsPlan.push({ lab: best.lab, type: best.type, name: best.item.name, cost: best.cost, mrp: best.mrp, coveredTests: best.coveredTests, savings: best.savings, indivCost: best.indivCost });
    for(let t of best.coveredTests) remaining.delete(t);
  }
  const individualItems = [];
  for(let testName of remaining) {
    const cheapest = findCheapestIndividualTest(testName, activeLabsSet);
    if(cheapest) individualItems.push({ lab: cheapest.lab, type: "Test", name: testName, cost: cheapest.cost, mrp: cheapest.test.mrp, coveredTests: [testName] });
  }
  const finalItems = [...selectedItemsPlan, ...individualItems];
  let totalB2B = 0, totalMRP = 0;
  finalItems.forEach(it => { totalB2B += it.cost; totalMRP += it.mrp; });
  const savingsTotal = totalMRP - totalB2B;
  const percent = totalMRP > 0 ? (savingsTotal/totalMRP)*100 : 0;
  const coveredSet = new Set(); finalItems.forEach(it => it.coveredTests.forEach(t => coveredSet.add(t)));
  const missing = uniqueTests.filter(t => !coveredSet.has(t));
  return { items: finalItems, totalB2B: Math.round(totalB2B*100)/100, totalMRP: Math.round(totalMRP*100)/100, savings: Math.round(savingsTotal*100)/100, savingsPercent: Math.round(percent*100)/100, missing };
}

// Comparison render (same as before, using selectedTestsFlat)
function renderComparison() {
  if(selectedTestsFlat.length === 0) { comparisonSection.style.display = "none"; return; }
  comparisonSection.style.display = "block";
  let html = `<table class="comparison-table"><thead><tr><th>Lab</th><th>Selected Tests (MRP / B2B)</th><th>Total MRP / B2B</th><th>Combos covering selected</th><th>Packages covering selected</th></tr></thead><tbody>`;
  for(const lab of labsData) {
    if(!selectedLabs.has(lab.name)) continue;
    const selectedInLab = selectedTestsFlat.filter(test => lab.tests.some(t => t.name === test && t.b2b !== null));
    let sumMRP = 0, sumB2B = 0;
    const testsHtml = selectedInLab.map(test => { 
      const tObj = lab.tests.find(tx => tx.name === test); 
      if(tObj) { sumMRP += tObj.mrp; if(tObj.b2b) sumB2B += tObj.b2b; }
      return `<span class="test-item">${test} <span style="color:#7AB2B2;">₹${tObj.mrp}</span> / <span class="b2p-highlight">₹${tObj.b2b}</span></span>`;
    }).join('');
    const totalCell = `<div><span class="price-mrp" style="text-decoration:none;">MRP: ₹${sumMRP}</span><br><span class="price-b2b">B2B: ₹${sumB2B}</span></div>`;
    const relevantCombos = lab.combos.filter(combo => combo.tests.some(t => selectedTestsFlat.includes(t))).map(combo => {
      const covered = combo.tests.filter(t => selectedTestsFlat.includes(t));
      return `<div><strong>${combo.name}</strong> <span style="color:#7AB2B2;">₹${combo.mrp}</span> / <span class="b2p-highlight">₹${combo.b2b}</span> <i class="fas fa-info-circle info-icon" onclick='showInfo("Combo: ${combo.name}", "${combo.tests.join(", ")}")'></i><div>Covers: ${covered.join(", ")}</div></div>`;
    }).join('');
    const relevantPackages = lab.packages.filter(pkg => { const expanded = expandPackageTests(lab, pkg); return expanded.some(t => selectedTestsFlat.includes(t)); }).map(pkg => {
      const expanded = expandPackageTests(lab, pkg);
      const covered = expanded.filter(t => selectedTestsFlat.includes(t));
      return `<div><strong>${pkg.name}</strong> <span style="color:#7AB2B2;">₹${pkg.mrp}</span> / <span class="b2p-highlight">₹${pkg.b2b}</span> <i class="fas fa-info-circle info-icon" onclick='showInfo("Package: ${pkg.name}", "Tests: ${expanded.join(", ")}")'></i><div>Covers: ${covered.join(", ")}</div></div>`;
    }).join('');
    html += `<tr><td class="lab-name">${lab.name}</td><td>${testsHtml || "-"}</td><td>${totalCell}</td><td>${relevantCombos || "No combos"}</td><td>${relevantPackages || "No packages"}</td></tr>`;
  }
  html += `</tbody></table>`;
  comparisonTable.innerHTML = html;
}

function copyToClipboard(text, successMessage) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => alert(successMessage)).catch(() => fallbackCopy(text, successMessage));
  } else { fallbackCopy(text, successMessage); }
}
function fallbackCopy(text, successMessage) {
  const textarea = document.createElement('textarea'); textarea.value = text; textarea.style.position = 'fixed'; textarea.style.top = '-9999px'; document.body.appendChild(textarea); textarea.select();
  try { document.execCommand('copy'); alert(successMessage); } catch(err) { alert("Copy failed. Please manually copy."); }
  document.body.removeChild(textarea);
}
function copySelectedNames() {
  if(selectedTestsFlat.length === 0) { alert("No selections to copy"); return; }
  const opt = optimizePlan(selectedTestsFlat, selectedLabs);
  const testNames = opt.items.filter(i => i.type === "Test").map(i => i.name);
  const comboNames = opt.items.filter(i => i.type === "Combo").map(i => i.name);
  const pkgNames = opt.items.filter(i => i.type === "Package").map(i => i.name);
  copyToClipboard([...testNames, ...comboNames, ...pkgNames].join(", "), "Copied selections");
}
window.copyLabItems = function(labName) {
  const opt = optimizePlan(selectedTestsFlat, selectedLabs);
  const labItems = opt.items.filter(i => i.lab === labName);
  copyToClipboard(labItems.map(i => i.name).join(", "), `Copied from ${labName}`);
};
globalCopyBtn.addEventListener("click", copySelectedNames);

window.showInfo = function(title, body) { document.getElementById("modalTitle").innerText = title; document.getElementById("modalBody").innerHTML = body; document.getElementById("infoModal").style.display = "flex"; };
window.closeModal = function() { document.getElementById("infoModal").style.display = "none"; };

function runOptimization() {
  if(selectedTestsFlat.length === 0) {
    resultDiv.innerHTML = `<div class="empty-state"><i class="fas fa-chart-simple"></i><p>Select tests or combos to see optimization results</p></div>`;
    renderComparison();
    return;
  }
  const opt = optimizePlan(selectedTestsFlat, selectedLabs);
  let html = `<div style="margin-bottom:24px;"><strong>Selected Items:</strong><div style="margin-top:12px; display:flex; flex-wrap:wrap; gap:10px;">${selectedItems.map(i => `<span style="background:#EBF4F6; padding:6px 14px; border-radius:20px;">${i.type === "combo" ? "📦 " + i.name : "🔬 " + i.name}</span>`).join('')}</div></div>`;
  html += `<h4 style="color:#09637E; margin-bottom:16px;"><i class="fas fa-microchip"></i> Optimized Multi-Lab Plan:</h4>`;
  if(opt.items.length === 0) html += `<div class="empty-state">No coverage possible</div>`;
  else {
    const grouped = new Map();
    opt.items.forEach(item => { if(!grouped.has(item.lab)) grouped.set(item.lab, []); grouped.get(item.lab).push(item); });
    for(let [labName, items] of grouped.entries()) {
      html += `<div style="background:#F8FDFE; border-radius:20px; margin-bottom:20px; padding:12px 16px; border:1px solid #D9E9EC;">
        <div class="lab-header"><strong><i class="fas fa-flask"></i> ${labName}</strong>
        <button class="lab-copy-btn" onclick="copyLabItems('${labName.replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i> Copy</button></div>`;
      for(let it of items) {
        let icon = it.type === "Test" ? '<i class="fas fa-microscope"></i>' : (it.type === "Combo" ? '<i class="fas fa-cubes"></i>' : '<i class="fas fa-box"></i>');
        html += `<div class="lab-block"><strong>${icon} ${it.type}: ${it.name}</strong><div>MRP: ₹${it.mrp} | <span class="b2p-highlight">B2B: ₹${it.cost}</span></div>${it.type !== "Test" ? `<div style="font-size:12px;">Savings: ₹${it.savings}</div>` : ''}</div>`;
      }
      html += `</div>`;
    }
  }
  html += `<div class="result"><div style="background:#F8FDFE; padding:20px; border-radius:16px;"><p><strong>💰 Total MRP:</strong> ₹${opt.totalMRP.toLocaleString()}</p><p><strong>✨ Optimized B2B Cost:</strong> <span style="font-size:18px; font-weight:700; color:#088395;">₹${opt.totalB2B.toLocaleString()}</span></p><div class="highlight"><i class="fas fa-tag"></i> Total Savings: ₹${opt.savings.toLocaleString()} (${opt.savingsPercent}% off)</div>${opt.missing.length ? `<div style="margin-top:15px; padding:10px; background:#FFF3E0; border-radius:12px;"><i class="fas fa-exclamation-triangle"></i> Unavailable: ${opt.missing.join(', ')}</div>` : ''}</div></div>`;
  resultDiv.innerHTML = html;
  renderComparison();
}

clearAllBtn.addEventListener("click", clearAll);
renderLabCheckboxes();
renderSelected();
runOptimization();
</script>
