    font-weight: 600;

  }

  .header h1 {

    font-weight: 700;
    background: linear-gradient(135deg, #FFFFFF 0%, #D4F1F4 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    margin-bottom: 8px;
    letter-spacing: -0.3px;
  }

  .header p {

  }

  .container {

    font-weight: 600;
    font-family: 'Rubik', sans-serif;
    color: #0F3D5E;
    margin-bottom: 20px;

    border: 1.5px solid #E5EAF0;

    font-size: 15px;
    transition: all 0.2s;

  .btn {

    font-family: 'DM Sans', sans-serif;
    font-weight: 600;
    padding: 12px 20px;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-primary {
    background: linear-gradient(105deg, #1ECAD3 0%, #12A7B0 100%);

    box-shadow: 0 2px 6px rgba(30, 202, 211, 0.2);
  }

  .btn-primary:hover {

  }

  .btn-secondary {
    background: #F0F4F9;
    color: #1A4A6F;
    border: 1px solid #E2E8F0;
  }

  .btn-secondary:hover {
    background: #E6EDF5;
    transform: translateY(-1px);
  }

  .btn-danger {
    background: #FEF3F2;
    color: #C2410C;
    border: 1px solid #FFD9D4;
  }

  .btn-danger:hover {
    background: #FFE4E0;
    transform: translateY(-1px);
  }

    border: 1px solid #CBF0F2;
    color: #0F5C70;
    padding: 6px 14px;
    font-size: 12px;
    border-radius: 40px;
    transition: all 0.2s;

    color: white;

  .item-list {

    padding-right: 6px;
  }

  .checkbox-item {

    align-items: center;
    gap: 14px;
    padding: 14px 16px;
    background: #FFFFFF;
    border: 1px solid #EDF2F7;
    border-radius: 16px;
    transition: all 0.2s;
    cursor: pointer;
  }

  .checkbox-item:hover {
    border-color: #1ECAD3;
    background: #F9FDFF;
    box-shadow: 0 4px 8px rgba(0,0,0,0.02);
    transform: translateX(2px);
  }

  .checkbox-item input {
    width: 20px;
    height: 20px;
    accent-color: #1ECAD3;
    cursor: pointer;
    pointer-events: auto;
  }

  .selected-items {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 20px;
  }

  .chip {

    color: #0F5C70;
    border-radius: 40px;
    padding: 8px 14px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid #CBF0F2;
    transition: all 0.1s;

    border: none;

    color: #D97706;

    align-items: center;

    color: #B91C1C;
  }

    background: #FFFFFF;
    border-radius: 20px;
    margin-bottom: 28px;
    overflow: hidden;
    border: 1px solid #EFF3F8;
    transition: all 0.2s;
  }

  .lab-header {
    padding: 20px 24px;
    background: #FFFFFF;
    border-bottom: 1px solid #ECF3F9;

    align-items: center;
    cursor: pointer;

  }

    font-weight: 700;
    color: #0F3D5E;
    margin: 0;
  }

    color: #1ECAD3;
    font-size: 22px;
  }

  .accordion-section {
    border-bottom: 1px solid #F0F4FA;
  }

  .section-header {
    padding: 16px 24px;
    background: #FBFDFF;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    font-weight: 600;
    font-size: 16px;
    color: #1D4E6E;
    transition: background 0.2s;

    background: #F2F8FC;
  }

  .section-arrow {

  }

    text-align: center;

    inset: 0;
    background: rgba(15, 61, 94, 0.75);

    align-items: center;
    justify-content: center;

    max-width: 650px;
    width: 90%;
    border-radius: 32px;
    padding: 28px;

    right: 28px;
    background: #1A4E6E;
    color: white;
    padding: 12px 24px;
    border-radius: 60px;
    font-weight: 600;
    backdrop-filter: blur(8px);
    display: none;
    z-index: 9999;

    border-top: 2px solid #ECF3F9;
    padding-top: 20px;

  .lab-group-card {
    background: #FBFDFF;
    border-radius: 18px;
    padding: 18px;
    margin-bottom: 20px;
    border: 1px solid #E9F0F5;

  .lab-group-header {
    display: flex;
    justify-content: space-between;

    flex-wrap: wrap;

    font-weight: 700;
    color: #0F3D5E;

    .results-two-columns {

      gap: 20px;
    }
  }

  .search-actions {
    display: flex;
    gap: 12px;
    margin: 16px 0 20px;
  }

  @media (max-width: 480px) {
    .search-actions {
      flex-direction: column;
    }
  }
</style>
</head>

    { id: "GD_LIFE_A1_GD", name: "GD Life A1", type: "package", contains: ["Iron Study", "RFT", "CBC", "LFT", "Lipid Profile", "Total TFT"], mrp: 1400, b2b: 295 },
    { id: "GD_LIFE_A3_GD", name: "GD Life A3", type: "package", contains: ["FBS", "LFT", "Lipid Profile", "TSH", "CBC", "RFT"], mrp: 1200, b2b: 230 },
    { id: "GD_WELLNESS_1_3_GD", name: "GD Wellness 1.3", type: "package", contains: ["Total Testosteron", "Iron Study", "LFT", "Lipid Profile", "HbA1C", "Vit D3", "Vit B12", "Total TFT"], mrp: 1800, b2b: 600 },
    { id: "ALPHA_WELLNESS_1_3_GD", name: "ALPHA WELLNESS 1.3", type: "package", contains: ["Total Testosteron", "Iron Study", "LFT", "Lipid Profile", "HbA1C", "RFT", "Vit D3", "Vit B12", "CBC", "ESR", "CRP", "Total TFT"], mrp: 2150, b2b: 750 },
    { id: "COMPREHENSIVE_FULL_BODY_CHECKUP_GD", name: "COMPREHENSIVE FULL BODY CHECKUP", type: "package", contains: ["CBC", "Vit B12", "Vit D3", "HBsAg", "Urine Routine", "Peripheral Smear", "ESR", "Electrolytes", "Iron Study", "LFT", "Lipid Profile", "CRP"], mrp: 2000, b2b: 1050 },
    { id: "GD_WELLNESS_15_1_GD", name: "GD WELLNESS 15.1", type: "package", contains: ["Iron Study", "LFT", "Lipid Profile", "RFT", "Total TFT"], mrp: 1000, b2b: 550 },
    { id: "GD_LIFE_A6_GD", name: "GD LIFE - A6", type: "package", contains: ["Homocysten", "Iron Study", "LFT", "Lipid Profile", "Total TFT", "HbA1C", "RFT", "Vit B12", "Vit D3"], mrp: 1800, b2b: 750 },
    { id: "SUMMER_HEALTH_PACKAGE_GD", name: "Summer Health Package", type: "package", contains: ["Iron Study", "Total TFT", "LFT", "HbA1C", "RFT", "Vit D3", "Vit B12", "Lipid Profile", "Electrolytes", "CBC", "Urine Routine"], mrp: 2000, b2b: 700 }
  ]
}
  ];

  let normalizedEntities = [], selectedItems = [], optimizedPlan = [];
  let selectedLabs = new Set([labsData[0].name]);

  function currency(v) { return "₹" + Number(v).toLocaleString(); }
  function unique(arr) { return [...new Set(arr)]; }
  function uniqueById(arr){ const map = new Map(); arr.forEach(item=> map.set(item.id,item)); return [...map.values()]; }
  
  function showToast(msg) { 
    const t = document.getElementById("toast"); 
    t.innerHTML = `<i class="fas fa-check-circle" style="margin-right: 8px;"></i> ${msg}`; 
    t.classList.add("show"); 
    setTimeout(() => t.classList.remove("show"), 2000); 
  }
  
  function focusSearchInput(){ document.getElementById("searchInput").focus(); }

  async function copyToClipboard(text, successMessage) {
    if (!text || text.trim() === "") {
      showToast("Nothing to copy");
      return false;
    }
    try {
      await navigator.clipboard.writeText(text);
      showToast(successMessage || "Copied successfully");
      return true;
    } catch (err) {
      try {
        const textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        textarea.style.top = "-9999px";
        document.body.appendChild(textarea);
        textarea.select();
        const success = document.execCommand("copy");
        textarea.remove();
        if (success) {
          showToast(successMessage || "Copied successfully");
          return true;
        } else {
          showToast("Copy failed. Please try again.");
          return false;
        }
      } catch (fallbackErr) {
        showToast("Copy failed. Please manually select and copy.");
        return false;
      }
    }
  }

  function buildLabLookup(lab){ const lookup={}; [...lab.tests,...lab.combos,...lab.packages].forEach(i=>{ lookup[i.id]=i; lookup[i.name]=i; }); return lookup; }
  function normalizeEntity(entity, lookup){ const visited=new Set(); function expand(item){ if(!item||visited.has(item.id)) return []; visited.add(item.id); if(item.type==="test") return [item.name]; let res=[]; (item.contains||[]).forEach(name=>{ const child=lookup[name]||Object.values(lookup).find(x=>x.name===name); if(child){ if(child.type==="test") res.push(child.name); else res.push(...expand(child)); } else res.push(name); }); return res; } return {...entity, covers:unique(expand(entity))}; }
  function buildNormalizedEntities(){ normalizedEntities=[]; labsData.forEach(lab=>{ const lookup=buildLabLookup(lab); [...lab.tests,...lab.combos,...lab.packages].forEach(e=>{ normalizedEntities.push({...normalizeEntity(e,lookup), lab:lab.name}); }); }); }
  function getAllSelectableItems(){ const map=new Map(); normalizedEntities.forEach(e=>{ const key=e.name+"_"+e.type; if(!map.has(key)) map.set(key,{name:e.name,type:e.type,covers:e.covers}); }); return [...map.values()]; }
  function getRequiredTests(){ let tests=[]; selectedItems.forEach(item=>{ const ent=normalizedEntities.find(x=>x.name===item.name && x.type===item.type); if(ent) tests.push(...ent.covers); }); return unique(tests); }

  function toggleItemSelection(item, isChecked) {
    if(isChecked) {
      if(!selectedItems.some(x=> x.name===item.name && x.type===item.type)) selectedItems.push(item);
    } else {
      selectedItems = selectedItems.filter(x=> !(x.name===item.name && x.type===item.type));
    }
    renderSelectionList();
    renderSelectedItems();
    renderComparisonView();
    optimizePlan();
  }

  function renderSelectionList(){ 
    const container=document.getElementById("selectionList"); 
    const search=document.getElementById("searchInput").value.toLowerCase(); 
    const items=getAllSelectableItems().filter(i=>i.name.toLowerCase().includes(search)); 
    container.innerHTML=""; 
    items.forEach(item=>{ 
      const checked=selectedItems.some(x=>x.name===item.name && x.type===item.type); 
      const div=document.createElement("div"); 
      div.className="checkbox-item"; 
      div.innerHTML=`<input type="checkbox" ${checked?"checked":""}><div><strong>${item.name}</strong><div class="muted" style="font-size:12px;">${item.type.toUpperCase()}</div></div>`; 
      const chk=div.querySelector("input");
      div.addEventListener("click", (e) => {
        if(e.target.tagName === 'INPUT' || e.target.closest('input')) return;
        const newChecked = !chk.checked;
        chk.checked = newChecked;
        toggleItemSelection(item, newChecked);
        focusSearchInput();
      });
      chk.addEventListener("change", (e) => {
        e.stopPropagation();
        toggleItemSelection(item, chk.checked);
        focusSearchInput();
      });
      container.appendChild(div); 
    }); 
  }

  function renderSelectedItems(){ const cont=document.getElementById("selectedItemsContainer"); cont.innerHTML=""; selectedItems.forEach(item=>{ const chip=document.createElement("div"); chip.className="chip"; chip.innerHTML=`${item.name}<button>&times;</button>`; chip.querySelector("button").addEventListener("click",()=>{ selectedItems=selectedItems.filter(x=>!(x.name===item.name && x.type===item.type)); renderSelectionList(); renderSelectedItems(); renderComparisonView(); optimizePlan(); focusSearchInput(); }); cont.appendChild(chip); }); }
  
  function renderLabFilters(){ const cont=document.getElementById("labFilters"); cont.innerHTML=""; labsData.forEach(lab=>{ const checked=selectedLabs.has(lab.name); const div=document.createElement("div"); div.className="checkbox-item"; div.innerHTML=`<input type="checkbox" ${checked?"checked":""}><div>${lab.name}</div>`; div.querySelector("input").addEventListener("change",e=>{ if(e.target.checked) selectedLabs.add(lab.name); else selectedLabs.delete(lab.name); renderComparisonView(); optimizePlan(); }); cont.appendChild(div); }); }
  
  function renderEntityCard(entity){ return `<div class="entity-card" data-entity-name="${entity.name}" data-entity-type="${entity.type}"><div style="display:flex;justify-content:space-between;"><h4 style="font-weight:600;">${entity.name}</h4><span class="badge ${entity.type}">${entity.type}</span></div><div class="price-block"><div style="display:flex;justify-content:space-between;"><span>MRP</span><span>${currency(entity.mrp)}</span></div><div class="b2b-highlight"><div style="display:flex;justify-content:space-between;"><span>B2B PRICE</span><span class="b2b-price">${currency(entity.b2b)}</span></div></div></div>${entity.type!=="test"?`<button class="info-btn" data-id="${entity.id}"><i class="fas fa-info-circle"></i> Details</button>`:""}</div>`; }
  
  function attachAccordionEvents(){ document.querySelectorAll(".section-header").forEach(h=>{ h.removeEventListener("click", toggleSection); h.addEventListener("click", toggleSection); }); }
  function toggleSection(e){ const header=e.currentTarget; const content=header.nextElementSibling; if(content&&content.classList.contains("section-content")){ const arrow=header.querySelector(".section-arrow"); content.classList.toggle("open"); if(arrow) arrow.style.transform=content.classList.contains("open")?"rotate(180deg)":"rotate(0deg)"; } }
  
  function renderComparisonView(){ const container=document.getElementById("comparisonView"); container.innerHTML=""; const required=getRequiredTests(); if(required.length===0){ container.innerHTML=`<div class="muted" style="padding:24px;text-align:center;">Select tests to see lab comparison</div>`; return; }
    const visible=labsData.filter(l=>selectedLabs.has(l.name));
    visible.forEach(lab=>{ const entities=normalizedEntities.filter(x=>x.lab===lab.name&&x.covers.some(t=>required.includes(t))); const tests=entities.filter(x=>x.type==="test"), combos=entities.filter(x=>x.type==="combo"), packages=entities.filter(x=>x.type==="package"); const block=document.createElement("div"); block.className="lab-block"; block.innerHTML=`<div class="lab-header"><h2><i class="fas fa-hospital-user" style="color:#1ECAD3; margin-right:8px;"></i>${lab.name}</h2><span class="accordion-icon"><i class="fas fa-chevron-down"></i></span></div><div class="lab-body"><div class="accordion-section"><div class="section-header"><span><i class="fas fa-vial"></i> Individual Tests (${tests.length})</span><span class="section-arrow">▼</span></div><div class="section-content"><div class="entity-grid">${tests.map(renderEntityCard).join("")}</div></div></div><div class="accordion-section"><div class="section-header"><span><i class="fas fa-puzzle-piece"></i> Combos (${combos.length})</span><span class="section-arrow">▼</span></div><div class="section-content"><div class="entity-grid">${combos.map(renderEntityCard).join("")}</div></div></div><div class="accordion-section"><div class="section-header"><span><i class="fas fa-cubes"></i> Packages (${packages.length})</span><span class="section-arrow">▼</span></div><div class="section-content"><div class="entity-grid">${packages.map(renderEntityCard).join("")}</div></div></div></div>`; container.appendChild(block); });
    attachAccordionEvents(); 
    attachInfoButtons(); 
    attachComparisonCardClick(); 
  }
  
  function attachComparisonCardClick() {
    document.querySelectorAll(".entity-card").forEach(card => {
      card.removeEventListener("click", comparisonCardHandler);
      card.addEventListener("click", comparisonCardHandler);
    });
  }
  function comparisonCardHandler(e) {
    if(e.target.closest('.info-btn')) return;
    const card = e.currentTarget;
    const name = card.getAttribute("data-entity-name");
    const type = card.getAttribute("data-entity-type");
    if(name && type) {
      const selectableItem = getAllSelectableItems().find(i => i.name === name && i.type === type);
      if(selectableItem) {
        const isSelected = selectedItems.some(x=> x.name === selectableItem.name && x.type === selectableItem.type);
        toggleItemSelection(selectableItem, !isSelected);
      }
    }
  }
  
  function attachInfoButtons(){ document.querySelectorAll(".info-btn").forEach(btn=>{ btn.addEventListener("click",(e)=>{ e.stopPropagation(); const entity=normalizedEntities.find(e=>e.id===btn.dataset.id); if(entity) openModal(entity); }); }); }
  function openModal(entity){ document.getElementById("modalTitle").innerHTML=entity.name; document.getElementById("modalBody").innerHTML=`<div><strong>Type:</strong> ${entity.type}</div><div><strong>MRP:</strong> ${currency(entity.mrp)}</div><div class="b2b-highlight" style="margin:12px 0"><strong>B2B:</strong> ${currency(entity.b2b)}</div>${entity.contains?`<div><strong>Contains:</strong><ul>${entity.contains.map(c=>`<li>${c}</li>`).join("")}</ul></div>`:""}<div><strong>Expanded Tests:</strong><ul>${entity.covers.map(c=>`<li>${c}</li>`).join("")}</ul></div>`; document.getElementById("infoModal").classList.add("active"); }
  document.getElementById("closeModal").addEventListener("click",()=>document.getElementById("infoModal").classList.remove("active"));

  function optimizePlan(){ const req=getRequiredTests(); if(req.length===0){ optimizedPlan=[]; updateTotals(0,0); document.getElementById("optimizedResults").innerHTML=`<div class="muted">Select items to view optimized plan</div>`; return; }
    let entities=normalizedEntities.filter(x=>selectedLabs.has(x.lab)).filter(e=>e.covers.some(t=>req.includes(t))); const bitMap={}; req.forEach((t,i)=>bitMap[t]=i); const maskEnt=entities.map(e=>{ let mask=0; e.covers.forEach(t=>{ if(bitMap.hasOwnProperty(t)) mask|=(1<<bitMap[t]); }); return {...e,mask}; }); const target=(1<<req.length)-1; const dp=Array(target+1).fill(Infinity); const parent=Array(target+1).fill(null); dp[0]=0; for(let cur=0;cur<=target;cur++){ if(dp[cur]===Infinity)continue; maskEnt.forEach(e=>{ const nxt=cur|e.mask; const newCost=dp[cur]+e.b2b; if(newCost<dp[nxt]){ dp[nxt]=newCost; parent[nxt]={prevMask:cur,entity:e}; } }); } if(dp[target]===Infinity){ document.getElementById("optimizedResults").innerHTML=`<div class="muted">Insufficient coverage</div>`; return; } let cur=target, chosen=[]; while(cur!==0){ const step=parent[cur]; if(!step)break; chosen.push(step.entity); cur=step.prevMask; } optimizedPlan=uniqueById(chosen.reverse()); renderOptimizedPlan(); }

  function renderOptimizedPlan(){ 
    const cont=document.getElementById("optimizedResults"); 
    cont.innerHTML=""; 
    if(!optimizedPlan.length)return; 
    let totalMRP=0,totalB2B=0,group={}; 
    optimizedPlan.forEach(i=>{ totalMRP+=i.mrp; totalB2B+=i.b2b; if(!group[i.lab])group[i.lab]=[]; group[i.lab].push(i); }); 
    const listDiv=document.createElement("div"); 
    optimizedPlan.forEach(item=>{ const el=document.createElement("div"); el.className="optimized-item"; el.innerHTML=`<div style="display:flex;justify-content:space-between;"><div><strong style="font-size:16px;">${item.name}</strong><div class="muted">${item.lab}</div></div><span class="badge ${item.type}">${item.type}</span></div><div class="covered-tests" style="font-size:13px;"><i class="fas fa-dna"></i> Covers: ${item.covers.join(", ")}</div><div class="price-block" style="margin-top:12px;"><div>MRP ${currency(item.mrp)}</div><div class="b2b-highlight">B2B ${currency(item.b2b)}</div></div>`; listDiv.appendChild(el); }); 
    cont.appendChild(listDiv); 
    const groupDiv=document.createElement("div"); groupDiv.className="lab-grouping-section"; 
    groupDiv.innerHTML="<h4 style='font-weight:600; margin-bottom:16px;'><i class='fas fa-building'></i> Lab-wise Grouping with Copy</h4>"; 
    Object.entries(group).forEach(([lab,items])=>{ 
      const cardDiv=document.createElement("div"); cardDiv.className="lab-group-card"; 
      const itemNames = items.map(i => i.name);
      const uniqueNames = [...new Set(itemNames)];
      const copyText = uniqueNames.join(", ");
      cardDiv.innerHTML=`<div class="lab-group-header"><span class="lab-group-title"><i class="fas fa-flask" style="color:#1ECAD3;"></i> ${lab}</span><button class="btn-lab-copy copy-lab-btn" data-lab="${lab}" data-copy-text="${copyText.replace(/"/g, '&quot;')}"><i class="fas fa-copy"></i> Copy Items (${items.length})</button></div><ul class="lab-items-list">${items.map(i=>`<li>${i.name}</li>`).join("")}</ul>`; 
      groupDiv.appendChild(cardDiv); 
    }); 
    cont.appendChild(groupDiv); 
    updateTotals(totalMRP,totalB2B); 
    
    document.querySelectorAll('.copy-lab-btn').forEach(btn => {
      btn.removeEventListener('click', handleLabCopy);
      btn.addEventListener('click', handleLabCopy);
    });
  }
  
  function handleLabCopy(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const labName = btn.getAttribute('data-lab');
    const copyText = btn.getAttribute('data-copy-text');
    if (copyText && copyText.trim()) {
      copyToClipboard(copyText, `Copied ${labName} items`);
    } else {
      showToast(`No items to copy for ${labName}`);
    }
  }

  function updateTotals(mrp,b2b){ document.getElementById("totalMRP").innerHTML=currency(mrp); document.getElementById("totalB2B").innerHTML=currency(b2b); document.getElementById("totalSavings").innerHTML=currency(mrp-b2b); }

  document.getElementById("copyAllBtn").addEventListener("click", async () => { 
    if(optimizedPlan.length === 0){ 
      showToast("Nothing to copy"); 
      return; 
    } 
    const allItemNames = unique(optimizedPlan.map(x => x.name));
    const text = allItemNames.join(", ");
    copyToClipboard(text, "Copied all lab items");
  });
  
  document.getElementById("searchInput").addEventListener("input",renderSelectionList);
  document.getElementById("optimizeBtn").addEventListener("click",optimizePlan);
  document.getElementById("clearAllBtn").addEventListener("click",()=>{ selectedItems=[]; document.getElementById("searchInput").value=""; renderSelectionList(); renderSelectedItems(); renderComparisonView(); optimizePlan(); focusSearchInput(); });
  
  buildNormalizedEntities(); 
  renderSelectionList(); 
  renderSelectedItems(); 
  renderLabFilters(); 
  renderComparisonView(); 
  optimizePlan(); 
  focusSearchInput();
</script>
