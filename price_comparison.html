let normalizedEntities = [];
let selectedItems = [];
let optimizedPlan = [];
let selectedLabs = new Set([labsData[0].name]);
let isOptimizing = false;

function currency(v) { return (v !== null && v !== undefined) ? "₹" + Number(v).toLocaleString() : "₹0"; }
function unique(arr) { return [...new Set(arr)]; }
function uniqueById(arr) { const map = new Map(); arr.forEach(item => { if(item && item.id) map.set(item.id, item); }); return [...map.values()]; }

function showToast(msg) {
  const t = document.getElementById("toast");
  t.innerHTML = `<i class="fas fa-check-circle"></i> ${msg}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

function focusSearchInput() {

}

function clearSearchInput() {
  const searchInput = document.getElementById("searchInput");
  searchInput.value = "";
  searchInput.focus();
  renderSelectionList();
}

async function copyToClipboard(text, successMessage) {
  if (!text || text.trim() === "") { showToast("Nothing to copy"); return false; }
  try {
    await navigator.clipboard.writeText(text);
    showToast(successMessage || "Copied successfully");
    return true;
  } catch (err) {
    try {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.style.position = "fixed";
      textarea.style.top = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
      showToast(successMessage || "Copied successfully");
      return true;
    } catch (e) {
      showToast("Copy failed");
      return false;
    }
  }
}

function buildLabLookup(lab) {
  const lookup = {};
  if (lab.tests) lab.tests.forEach(i => { if (i) { lookup[i.id] = i; lookup[i.name] = i; } });
  if (lab.combos) lab.combos.forEach(i => { if (i) { lookup[i.id] = i; lookup[i.name] = i; } });
  if (lab.packages) lab.packages.forEach(i => { if (i) { lookup[i.id] = i; lookup[i.name] = i; } });
  return lookup;
}

function normalizeEntity(entity, lookup) {
  if (!entity) return entity;
  const visited = new Set();
  function expand(item) {
    if (!item || visited.has(item.id)) return [];
    visited.add(item.id);
    if (item.type === "test") return [item.name];
    let res = [];
    if (item.contains && Array.isArray(item.contains)) {
      item.contains.forEach(name => {
        try {
          const child = lookup[name] || Object.values(lookup).find(x => x && x.name === name);
          if (child) {
            if (child.type === "test") res.push(child.name);
            else res.push(...expand(child));
          } else res.push(name);
        } catch(e) { res.push(name); }
      });
    }
    return res;
  }
  try {
    return { ...entity, covers: unique(expand(entity)) };
  } catch(e) {
    return { ...entity, covers: [entity.name] };
  }
}

function buildNormalizedEntities() {
  normalizedEntities = [];
  labsData.forEach(lab => {
    const lookup = buildLabLookup(lab);
    if (lab.tests) lab.tests.forEach(e => { if (e) normalizedEntities.push({ ...normalizeEntity(e, lookup), lab: lab.name }); });
    if (lab.combos) lab.combos.forEach(e => { if (e) normalizedEntities.push({ ...normalizeEntity(e, lookup), lab: lab.name }); });
    if (lab.packages) lab.packages.forEach(e => { if (e) normalizedEntities.push({ ...normalizeEntity(e, lookup), lab: lab.name }); });
  });
}

function getAllSelectableItems() {
  const map = new Map();
  normalizedEntities.forEach(e => {
    if (!e || !e.name) return;
    const key = e.name + "_" + e.type;
    if (!map.has(key)) map.set(key, { name: e.name, type: e.type, covers: e.covers || [e.name] });
  });
  return [...map.values()];
}

function getRequiredTests() {
  let tests = [];
  selectedItems.forEach(item => {
    try {
      const ent = normalizedEntities.find(x => x && x.name === item.name && x.type === item.type);
      if (ent && ent.covers && Array.isArray(ent.covers)) tests.push(...ent.covers);
      else if (ent) tests.push(ent.name);
    } catch(e) { tests.push(item.name); }
  });
  return unique(tests);
}

function toggleItemSelection(item, isChecked) {
  if (isChecked) {
    if (!selectedItems.some(x => x.name === item.name && x.type === item.type)) selectedItems.push(item);
  } else {
    selectedItems = selectedItems.filter(x => !(x.name === item.name && x.type === item.type));
  }
  renderSelectionList();
  renderSelectedItems();
  clearSearchInput();
}

function renderSelectionList() {
  const container = document.getElementById("selectionList");
  const search = document.getElementById("searchInput").value.toLowerCase();
  const items = getAllSelectableItems().filter(i => i.name.toLowerCase().includes(search));
  container.innerHTML = "";
  items.forEach(item => {
    const checked = selectedItems.some(x => x.name === item.name && x.type === item.type);
    const div = document.createElement("div");
    div.className = "checkbox-item";
    div.innerHTML = `<input type="checkbox" ${checked ? "checked" : ""}><div><strong>${escapeHtml(item.name)}</strong><div style="font-size:12px; color:#64748b;">${item.type.toUpperCase()}</div></div>`;
    const chk = div.querySelector("input");
    div.addEventListener("click", (e) => {
      if (e.target.tagName === 'INPUT' || e.target.closest('input')) return;
      const newChecked = !chk.checked;
      chk.checked = newChecked;
      toggleItemSelection(item, newChecked);
    });
    chk.addEventListener("change", (e) => {
      e.stopPropagation();
      toggleItemSelection(item, chk.checked);
    });
    container.appendChild(div);
  });
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  });
}

function renderSelectedItems() {
  const cont = document.getElementById("selectedItemsContainer");
  cont.innerHTML = "";
  selectedItems.forEach(item => {
    const chip = document.createElement("div");
    chip.className = "chip";
    chip.innerHTML = `${escapeHtml(item.name)}<button>&times;</button>`;
    chip.querySelector("button").addEventListener("click", () => {
      selectedItems = selectedItems.filter(x => !(x.name === item.name && x.type === item.type));
      renderSelectionList();
      renderSelectedItems();
    });
    cont.appendChild(chip);
  });
}

function renderLabFilters() {
  const cont = document.getElementById("labFilters");
  cont.innerHTML = "";
  labsData.forEach(lab => {
    const checked = selectedLabs.has(lab.name);
    const div = document.createElement("div");
    div.className = "checkbox-item";
    div.innerHTML = `<input type="checkbox" ${checked ? "checked" : ""}><div>${escapeHtml(lab.name)}</div>`;
    div.querySelector("input").addEventListener("change", e => {
      if (e.target.checked) {
        selectedLabs.add(lab.name);
      } else {
        selectedLabs.delete(lab.name);
      }
      if (document.getElementById("comparisonCard").style.display === "block") {
        renderComparisonViewOnly();
      }
    });
    cont.appendChild(div);
  });
}

// SAFE OPTIMIZATION WITH CRASH PROTECTION
function optimizePlan() {
  if (isOptimizing) return;
  isOptimizing = true;
  const btn = document.getElementById("optimizeBtn");
  const originalHtml = btn.innerHTML;
  btn.innerHTML = '<span class="loading-overlay"></span> Optimizing...';
  btn.style.opacity = "0.7";
  btn.style.pointerEvents = "none";
  
  setTimeout(() => {
    try {
      const required = getRequiredTests();
      if (required.length === 0) {
        optimizedPlan = [];
        updateTotals(0, 0);
        document.getElementById("optimizedResults").innerHTML = `<div style="padding:24px;text-align:center;color:#64748b;">Select items to view optimized plan</div>`;
        document.getElementById("comparisonCard").style.display = "block";
        document.getElementById("resultsSection").style.display = "grid";
        renderComparisonViewOnly();
        isOptimizing = false;
        btn.innerHTML = originalHtml;
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
        return;
      }
      
      // Limit number of tests for DP safety (max 20 tests to prevent memory issues)
      const MAX_TESTS = 20;
      let safeTests = required;
      let wasTruncated = false;
      if (required.length > MAX_TESTS) {
        safeTests = required.slice(0, MAX_TESTS);
        wasTruncated = true;
        console.warn(`Tests truncated from ${required.length} to ${MAX_TESTS} for performance`);
      }
      
      renderComparisonViewOnly();
      document.getElementById("comparisonCard").style.display = "block";
      
      let entities = normalizedEntities.filter(x => x && selectedLabs.has(x.lab));
      entities = entities.filter(e => e.covers && Array.isArray(e.covers) && e.covers.some(t => safeTests.includes(t)));
      
      if (entities.length === 0) {
        document.getElementById("optimizedResults").innerHTML = `<div style="padding:24px;text-align:center;color:#64748b;">⚠️ No items available to cover the selected tests from the chosen labs.</div>`;
        document.getElementById("resultsSection").style.display = "grid";
        isOptimizing = false;
        btn.innerHTML = originalHtml;
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
        return;
      }
      
      const bitMap = {};
      safeTests.forEach((t, i) => bitMap[t] = i);
      const maskEnt = entities.map(e => {
        let mask = 0;
        if (e.covers) {
          e.covers.forEach(t => { 
            if (bitMap.hasOwnProperty(t)) mask |= (1 << bitMap[t]); 
          });
        }
        return { ...e, mask };
      });
      
      const target = (1 << safeTests.length) - 1;
      
      // Safety check: if target is too large (more than 2^20), use greedy fallback
      if (target > 1048575) { // 2^20 - 1
        console.warn("Target mask too large, using fallback greedy selection");
        const greedyPlan = [];
        const coveredTests = new Set();
        const sortedEntities = [...maskEnt].sort((a, b) => (a.b2b / (a.covers?.length || 1)) - (b.b2b / (b.covers?.length || 1)));
        for (const entity of sortedEntities) {
          const newTests = entity.covers.filter(t => safeTests.includes(t) && !coveredTests.has(t));
          if (newTests.length > 0) {
            greedyPlan.push(entity);
            newTests.forEach(t => coveredTests.add(t));
          }
          if (coveredTests.size === safeTests.length) break;
        }
        if (coveredTests.size === safeTests.length) {
          optimizedPlan = uniqueById(greedyPlan);
          renderOptimizedPlan();
          document.getElementById("resultsSection").style.display = "grid";
          if (wasTruncated) showToast("Note: Optimized with limited tests for performance");
          isOptimizing = false;
          btn.innerHTML = originalHtml;
          btn.style.opacity = "1";
          btn.style.pointerEvents = "auto";
          return;
        }
      }
      
      const dp = Array(target + 1).fill(Infinity);
      const parent = Array(target + 1).fill(null);
      dp[0] = 0;
      
      for (let cur = 0; cur <= target; cur++) {
        if (dp[cur] === Infinity) continue;
        for (const e of maskEnt) {
          const nxt = cur | e.mask;
          const newCost = dp[cur] + e.b2b;
          if (newCost < dp[nxt]) {
            dp[nxt] = newCost;
            parent[nxt] = { prevMask: cur, entity: e };
          }
        }
      }
      
      if (dp[target] === Infinity) {
        document.getElementById("optimizedResults").innerHTML = `<div style="padding:24px;text-align:center;color:#64748b;">⚠️ Insufficient coverage - selected tests cannot be covered by items from selected labs.</div>`;
        document.getElementById("resultsSection").style.display = "grid";
        isOptimizing = false;
        btn.innerHTML = originalHtml;
        btn.style.opacity = "1";
        btn.style.pointerEvents = "auto";
        return;
      }
      
      let cur = target, chosen = [];
      let safetyCounter = 0;
      const MAX_ITERATIONS = 100;
      while (cur !== 0 && safetyCounter < MAX_ITERATIONS) {
        const step = parent[cur];
        if (!step) break;
        chosen.push(step.entity);
        cur = step.prevMask;
        safetyCounter++;
      }
      optimizedPlan = uniqueById(chosen.reverse());
      renderOptimizedPlan();
      document.getElementById("resultsSection").style.display = "grid";
      if (wasTruncated) showToast("Note: Optimized with limited tests for performance");
    } catch (error) {
      console.error("Optimization error:", error);
      showToast("Optimization encountered an issue. Please try with fewer selections.");
      document.getElementById("optimizedResults").innerHTML = `<div style="padding:24px;text-align:center;color:#dc2626;">⚠️ Optimization failed. Please try with a different combination of tests.</div>`;
      document.getElementById("resultsSection").style.display = "grid";
    } finally {
      isOptimizing = false;
      btn.innerHTML = originalHtml;
      btn.style.opacity = "1";
      btn.style.pointerEvents = "auto";
    }
  }, 50);
}
