// Global state
let selectedItems = []; // { name, type, tests (for combos) }
let selectedTestsFlat = [];
let selectedLabs = new Set(labsData.map(l => l.name));

// Helper functions
function updateFlatTests() {
  const testsSet = new Set();
  selectedItems.forEach(item => {
    if(item.type === "test") testsSet.add(item.name);
    else if(item.type === "combo" && item.tests) item.tests.forEach(t => testsSet.add(t));
  });
  selectedTestsFlat = Array.from(testsSet);
}

function isTestCoveredByCombo(testName) {
  return selectedItems.some(item => item.type === "combo" && item.tests && item.tests.includes(testName));
}

function getAllCombos() {
  const combosMap = new Map();
  labsData.forEach(lab => {
    lab.combos.forEach(combo => { 
      if(!combosMap.has(combo.name)) combosMap.set(combo.name, { ...combo, labName: lab.name });
    });
  });
  return Array.from(combosMap.values());
}

// Clear search input and suggestions after selection
function clearSearchAndFocus() {
  const searchInputElem = document.getElementById("search");
  const suggestionsElem = document.getElementById("suggestions");
  searchInputElem.value = "";
  suggestionsElem.innerHTML = "";
  searchInputElem.focus();
}

function addCombo(comboObj) {
  if(selectedItems.some(item => item.type === "combo" && item.name === comboObj.name)) {
    clearSearchAndFocus();
    return;
  }
  // Remove any individual tests that are part of this combo
  const updatedItems = selectedItems.filter(item => !(item.type === "test" && comboObj.tests.includes(item.name)));
  selectedItems = [...updatedItems, { name: comboObj.name, type: "combo", tests: comboObj.tests, mrp: comboObj.mrp, b2b: comboObj.b2b }];
  updateFlatTests();
  renderSelected();
  runOptimization();
  clearSearchAndFocus();
}

function addIndividualTest(testName) {
  if(isTestCoveredByCombo(testName)) { 
    alert(`"${testName}" is already covered by a selected combo. Please remove the combo first to select it individually.`);
    clearSearchAndFocus();
    return; 
  }
  if(selectedItems.some(item => item.type === "test" && item.name === testName)) {
    clearSearchAndFocus();
    return;
  }
  selectedItems.push({ name: testName, type: "test" });
  updateFlatTests();
  renderSelected();
  runOptimization();
  clearSearchAndFocus();
}

function removeItem(name, type) {
  selectedItems = selectedItems.filter(item => !(item.name === name && item.type === type));
  updateFlatTests();
  renderSelected();
  runOptimization();
}

function clearAll() { 
  selectedItems = []; 
  updateFlatTests(); 
  renderSelected(); 
  runOptimization(); 
}

function renderSelected() {
  const container = document.getElementById("selectedTests");
  container.innerHTML = "";
  if(selectedItems.length === 0) {
    container.innerHTML = '<div style="color:#8AA0B5; padding:12px; text-align:center;">No tests or combos selected. Start typing to add items.</div>';
    return;
  }
  selectedItems.forEach(item => {
    const span = document.createElement("span");
    if(item.type === "combo") {
      span.className = "selected-combo";
      span.innerHTML = `<i class="fas fa-layer-group"></i> ${item.name} <i class="fas fa-times" style="font-size: 10px;"></i>`;
      span.onclick = () => removeItem(item.name, "combo");
    } else {
      span.innerHTML = `<i class="fas fa-flask"></i> ${item.name} <i class="fas fa-times" style="font-size: 10px;"></i>`;
      span.onclick = () => removeItem(item.name, "test");
    }
    container.appendChild(span);
  });
}

// ========== OPTIMIZATION ENGINE - TRUE COST MINIMIZATION ==========

// Get all available tests from a package (expand combos inside)
function expandPackageTests(lab, pkg) {
  let testsSet = new Set([...pkg.tests]);
  if(pkg.combos) {
    pkg.combos.forEach(cn => {
      const combo = lab.combos.find(c => c.name === cn);
      if(combo) combo.tests.forEach(t => testsSet.add(t));
    });
  }
  return Array.from(testsSet);
}

// Get cheapest individual test across all selected labs
function getCheapestTestOption(testName, activeLabs) {
  let best = null;
  let minCost = Infinity;
  for(const lab of labsData) {
    if(!activeLabs.has(lab.name)) continue;
    const test = lab.tests.find(t => t.name === testName);
    if(test && test.b2b !== null && test.b2b < minCost) {
      minCost = test.b2b;
      best = {
        lab: lab.name,
        testName: testName,
        cost: test.b2b,
        mrp: test.mrp,
        type: "Test"
      };
    }
  }
  return best;
}

// Get all combo options for given tests
function getAllComboOptions(activeLabs) {
  const combos = [];
  for(const lab of labsData) {
    if(!activeLabs.has(lab.name)) continue;
    for(const combo of lab.combos) {
      combos.push({
        lab: lab.name,
        name: combo.name,
        tests: combo.tests,
        cost: combo.b2b,
        mrp: combo.mrp,
        type: "Combo",
        savings: null
      });
    }
  }
  return combos;
}

// Get all package options for given tests
function getAllPackageOptions(activeLabs) {
  const packages = [];
  for(const lab of labsData) {
    if(!activeLabs.has(lab.name)) continue;
    for(const pkg of lab.packages) {
      const expandedTests = expandPackageTests(lab, pkg);
      packages.push({
        lab: lab.name,
        name: pkg.name,
        tests: expandedTests,
        cost: pkg.b2b,
        mrp: pkg.mrp,
        type: "Package",
        savings: null
      });
    }
  }
  return packages;
}

// Find optimal combination using intelligent greedy algorithm
function findOptimalCombination(requiredTests, activeLabs) {
  const requiredSet = new Set(requiredTests);
  if(requiredSet.size === 0) return { items: [], totalCost: 0, totalMRP: 0 };
  
  // Get all available options (tests, combos, packages)
  const testOptions = [];
  for(const test of requiredTests) {
    const cheapest = getCheapestTestOption(test, activeLabs);
    if(cheapest) {
      testOptions.push({
        lab: cheapest.lab,
        name: cheapest.testName,
        tests: [cheapest.testName],
        cost: cheapest.cost,
        mrp: cheapest.mrp,
        type: "Test",
        coverage: 1,
        coverageSet: new Set([cheapest.testName])
      });
    }
  }
  
  const comboOptions = getAllComboOptions(activeLabs).map(combo => ({
    ...combo,
    coverage: combo.tests.filter(t => requiredSet.has(t)).length,
    coverageSet: new Set(combo.tests.filter(t => requiredSet.has(t)))
  })).filter(c => c.coverage > 0);
  
  const packageOptions = getAllPackageOptions(activeLabs).map(pkg => ({
    ...pkg,
    coverage: pkg.tests.filter(t => requiredSet.has(t)).length,
    coverageSet: new Set(pkg.tests.filter(t => requiredSet.has(t)))
  })).filter(p => p.coverage > 0);
  
  // Combine all options
  let allOptions = [...testOptions, ...comboOptions, ...packageOptions];
  if(allOptions.length === 0) return { items: [], totalCost: 0, totalMRP: 0 };
  
  // Calculate cost per covered test for sorting
  allOptions.forEach(opt => {
    opt.costPerCovered = opt.cost / opt.coverage;
  });
  
  // Sort by best value: higher coverage with lower cost per test
  allOptions.sort((a, b) => {
    if(a.coverage !== b.coverage) return b.coverage - a.coverage;
    return a.costPerCovered - b.costPerCovered;
  });
  
  // Greedy algorithm with lookahead for optimal selection
  let remaining = new Set(requiredTests);
  const selectedItemsList = [];
  let maxIterations = 50;
  
  while(remaining.size > 0 && maxIterations-- > 0) {
    let bestOption = null;
    let bestScore = -Infinity;
    
    for(const opt of allOptions) {
      const covered = opt.tests.filter(t => remaining.has(t)).length;
      if(covered === 0) continue;
      
      const coverageRatio = covered / remaining.size;
      const costPerCovered = opt.cost / covered;
      const score = (covered * 100) - (costPerCovered * 2);
      
      if(score > bestScore) {
        bestScore = score;
        bestOption = { ...opt, coveredTests: opt.tests.filter(t => remaining.has(t)), coveredCount: covered };
      }
    }
    
    if(!bestOption) break;
    
    selectedItemsList.push({
      lab: bestOption.lab,
      type: bestOption.type,
      name: bestOption.name,
      cost: bestOption.cost,
      mrp: bestOption.mrp,
      coveredTests: bestOption.coveredTests,
      individualCost: null,
      savings: null
    });
    
    bestOption.coveredTests.forEach(t => remaining.delete(t));
  }
  
  // Calculate totals
  let totalB2B = 0;
  let totalMRP = 0;
  
  for(const item of selectedItemsList) {
    totalB2B += item.cost;
    totalMRP += item.mrp;
    
    let indivCost = 0;
    for(const test of item.coveredTests) {
      const cheapest = getCheapestTestOption(test, activeLabs);
      if(cheapest) indivCost += cheapest.cost;
    }
    item.individualCost = indivCost;
    item.savings = indivCost - item.cost;
  }
  
  return {
    items: selectedItemsList,
    totalB2B: Math.round(totalB2B * 100) / 100,
    totalMRP: Math.round(totalMRP * 100) / 100,
    savings: Math.round((totalMRP - totalB2B) * 100) / 100,
    savingsPercent: totalMRP > 0 ? Math.round(((totalMRP - totalB2B) / totalMRP) * 10000) / 100 : 0
  };
}

function runOptimization() {
  if(selectedTestsFlat.length === 0) {
    document.getElementById("result").innerHTML = `<div class="empty-state"><i class="fas fa-chart-simple"></i><p>Select tests or combos to see optimization results</p></div>`;
    renderComparison();
    return;
  }
  
  const result = findOptimalCombination(selectedTestsFlat, selectedLabs);
  
  let html = `<div><strong>Selected Items:</strong><div style="margin:12px 0; display:flex; flex-wrap:wrap; gap:8px;">${selectedItems.map(i => `<span style="background:#F0F7FA; padding:4px 12px; border-radius:20px;">${i.type==="combo"?"📦 ":"🔬 "}${i.name}</span>`).join('')}</div></div>`;
  html += `<h4 style="color:#0F3D5E; margin:20px 0 16px;"><i class="fas fa-microchip"></i> Optimized Plan (Lowest B2B Cost)</h4>`;
  
  if(!result.items.length) {
    html += `<div class="empty-state">No coverage possible with selected labs</div>`;
  } else {
    const grouped = new Map();
    result.items.forEach(item => {
      if(!grouped.has(item.lab)) grouped.set(item.lab, []);
      grouped.get(item.lab).push(item);
    });
    
    for(let [labName, items] of grouped.entries()) {
      html += `<div style="background:#F8FCFE; border-radius:20px; margin-bottom:20px; padding:16px; border:1px solid #E2E8F0;">
        <div class="lab-header">
          <strong style="font-size:1rem; color:#0F3D5E;"><i class="fas fa-flask"></i> ${labName}</strong>
          <button class="btn-secondary" style="padding:4px 12px;" onclick="copyLabItems('${labName.replace(/'/g, "\\'")}')"><i class="fas fa-copy"></i> Copy</button>
        </div>`;
      
      items.forEach(item => {
        const icon = item.type === "Test" ? "🔬" : (item.type === "Combo" ? "📦" : "📦");
        html += `<div class="lab-block">
          <strong>${icon} ${item.type}: ${item.name}</strong>
          <div>MRP: ₹${item.mrp} | <span class="b2p-highlight">B2B: ₹${item.cost}</span></div>
          <div style="font-size:12px; color:#7AB2B2;">Covers: ${item.coveredTests.join(", ")}</div>
          ${item.savings > 0 ? `<div style="font-size:12px; color:#1ECAD3;">💰 Savings: ₹${item.savings} vs individual</div>` : ''}
        </div>`;
      });
      html += `</div>`;
    }
  }
  
  html += `<div class="result">
    <div style="background:#F5F7FA; padding:20px; border-radius:16px;">
      <p><strong>💰 Total MRP:</strong> ₹${result.totalMRP.toLocaleString()}</p>
      <p><strong>✨ Optimized B2B Cost:</strong> <span style="font-size:20px; font-weight:800; color:#1ECAD3;">₹${result.totalB2B.toLocaleString()}</span></p>
      <div class="highlight">
        <i class="fas fa-tag"></i> Total Savings: ₹${result.savings.toLocaleString()} (${result.savingsPercent}% off)
      </div>
    </div>
  </div>`;
  
  document.getElementById("result").innerHTML = html;
  renderComparison();
}

// Comparison table rendering
function renderComparison() {
  if(selectedTestsFlat.length === 0) { 
    document.getElementById("comparisonSection").style.display = "none"; 
    return; 
  }
  document.getElementById("comparisonSection").style.display = "block";
  
  let html = `<div class="comparison-table-wrapper"><table class="comparison-table"><thead>
    <tr><th>Lab</th><th>Selected Tests (MRP / B2B)</th><th>Total MRP / B2B</th><th>Combos</th><th>Packages</th></tr>
  </thead><tbody>`;
  
  for(const lab of labsData) {
    if(!selectedLabs.has(lab.name)) continue;
    const sel = selectedTestsFlat.filter(t => lab.tests.some(labT => labT.name === t && labT.b2b !== null));
    let sumMRP = 0, sumB2B = 0;
    const testsHtml = sel.map(t => { 
      const obj = lab.tests.find(lt => lt.name === t); 
      if(obj) { sumMRP += obj.mrp; sumB2B += obj.b2b; } 
      return `<span class="test-item">${t} <span style="color:#7AB2B2;">₹${obj.mrp}</span> / <span class="b2p-highlight">₹${obj.b2b}</span></span>`;
    }).join('');
    
    const combosHtml = lab.combos.filter(c => c.tests.some(t => selectedTestsFlat.includes(t)))
      .map(c => `<div><strong>${c.name}</strong> <span style="color:#7AB2B2;">₹${c.mrp}</span> / <span class="b2p-highlight">₹${c.b2b}</span> <i class="fas fa-info-circle info-icon" onclick='showInfo("${c.name}", "Tests: ${c.tests.join(", ")}")'></i></div>`).join('') || "-";
    
    const pkgsHtml = lab.packages.filter(p => expandPackageTests(lab, p).some(t => selectedTestsFlat.includes(t)))
      .map(p => `<div><strong>${p.name}</strong> <span style="color:#7AB2B2;">₹${p.mrp}</span> / <span class="b2p-highlight">₹${p.b2b}</span> <i class="fas fa-info-circle info-icon" onclick='showInfo("${p.name}", "Tests: ${expandPackageTests(lab, p).join(", ")}")'></i></div>`).join('') || "-";
    
    html += `<tr>
      <td class="lab-name">${lab.name}</td>
      <td>${testsHtml || "-"}</td>
      <td><div>MRP: ₹${sumMRP}</div><div><span class="price-b2b">B2B: ₹${sumB2B}</span></div></td>
      <td>${combosHtml}</td>
      <td>${pkgsHtml}</td>
    </tr>`;
  }
  html += `</tbody></td></div>`;
  document.getElementById("comparisonTable").innerHTML = html;
}

// Copy utilities
function copyToClipboard(text, msg) {
  if(navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => alert(msg)).catch(() => fallbackCopy(text, msg));
  } else {
    fallbackCopy(text, msg);
  }
}

function fallbackCopy(text, msg) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  try {
    document.execCommand('copy');
    alert(msg);
  } catch(e) {
    alert("Copy failed");
  }
  document.body.removeChild(ta);
}

function copyGlobal() {
  if(!selectedTestsFlat.length) return alert("No selections");
  const result = findOptimalCombination(selectedTestsFlat, selectedLabs);
  const items = result.items.map(i => i.name).join(", ");
  copyToClipboard(items, "Copied: " + items);
}

window.copyLabItems = function(labName) {
  const result = findOptimalCombination(selectedTestsFlat, selectedLabs);
  const items = result.items.filter(i => i.lab === labName).map(i => i.name).join(", ");
  copyToClipboard(items, `Copied from ${labName}: ${items}`);
};

// Modal functions
window.showInfo = function(title, body) { 
  document.getElementById("modalTitle").innerText = title; 
  document.getElementById("modalBody").innerHTML = body; 
  document.getElementById("infoModal").style.display = "flex"; 
};
window.closeModal = () => document.getElementById("infoModal").style.display = "none";

// Lab checkboxes
function renderLabCheckboxes() {
  const container = document.getElementById("labCheckboxes");
  container.innerHTML = "";
  labsData.forEach(lab => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    cb.checked = selectedLabs.has(lab.name);
    cb.addEventListener("change", (e) => { 
      if(e.target.checked) selectedLabs.add(lab.name); 
      else selectedLabs.delete(lab.name); 
      runOptimization(); 
      renderComparison(); 
    });
    label.appendChild(cb);
    label.appendChild(document.createTextNode(lab.name));
    container.appendChild(label);
  });
}

// Event listeners
document.getElementById("clearAllBtn").addEventListener("click", clearAll);
document.getElementById("globalCopyBtn").addEventListener("click", copyGlobal);

// Initialize
renderLabCheckboxes();
renderSelected();
runOptimization();
